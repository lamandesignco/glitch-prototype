<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glitch Drift</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0810; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; cursor: crosshair; }
        #info {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            color: rgba(200, 180, 220, 0.35);
            font-size: 10px; pointer-events: none; line-height: 1.6;
            letter-spacing: 0.5px; user-select: none;
            display: flex; justify-content: space-between;
        }
        #info .left { text-align: left; }
        #info .right { text-align: right; }
        #status {
            position: fixed; top: 20px; right: 20px;
            color: rgba(200, 180, 220, 0.25);
            font-size: 9px; pointer-events: none; text-align: right;
            line-height: 1.5; letter-spacing: 0.3px;
            transition: color 0.3s;
        }
        #energy-bar {
            position: fixed; bottom: 50px; left: 20px;
            width: 120px; height: 4px;
            background: rgba(200, 180, 220, 0.1);
            border: 1px solid rgba(200, 180, 220, 0.15);
            pointer-events: none;
        }
        #energy-fill {
            height: 100%;
            width: 100%;
            background: rgba(200, 180, 220, 0.4);
            transition: width 0.3s;
        }
        #energy-label {
            position: fixed; bottom: 56px; left: 20px;
            color: rgba(200, 180, 220, 0.25);
            font-size: 8px; pointer-events: none; font-family: 'Courier New', monospace;
        }
        #mode-display {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 11px; pointer-events: none; font-family: 'Courier New', monospace;
            letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="info">
        <div class="left">~ <span id="userLabel">drift</span> ~</div>
        <div class="right">click-drag · type · speak · <span id="userCount">1</span> here</div>
    </div>
    <div id="status"></div>
    <div id="energy-label">gl1tch 3n3rgy</div>
    <div id="energy-bar"><div id="energy-fill"></div></div>
    <div id="mode-display">\u25C9 draw</div>
    <div id="voice-status" style="position:fixed;bottom:36px;right:20px;font-size:7px;pointer-events:none;font-family:'Courier New',monospace;color:rgba(200,180,220,0.2);letter-spacing:1px">voice: ...</div>
    <div id="rift-notification" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;color:rgba(200,180,220,0.7);pointer-events:none;z-index:50;opacity:0;transition:opacity 0.5s;text-align:center"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script>
    // ─── Configuration ───────────────────────────────────────────────
    const CFG = {
        cellSize: 40,
        maxStrokes: 200,
        maxNoiseTexts: 30,
        decayRate: 0.0005,
        archiveInterval: 600,
        particleCap: 1500
    };

    const BASE = {
        grid: [200, 180, 220],
        voice: [200, 80, 120],
        keyboard: [80, 200, 180],
        ghost: [180, 180, 100],
        fossil: [100, 100, 120],
        bg: [10, 8, 15]
    };

    // ─── Grid Scroll ────────────────────────────────────────────────
    const SCROLL_SPEED = 10;
    const GRID_EXTENT = 2000;

    let scrollX = (Math.random() - 0.5) * GRID_EXTENT * 2;
    let scrollY = (Math.random() - 0.5) * GRID_EXTENT * 2;
    let screenShakeX = 0, screenShakeY = 0;

    // ─── User Parameters (unique per session) ────────────────────────
    function generateUser() {
        let id = 'u' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
        return {
            id: id,
            color: [
                80 + Math.floor(Math.random() * 120),
                60 + Math.floor(Math.random() * 100),
                140 + Math.floor(Math.random() * 100)
            ],
            tremble: 1.5 + Math.random() * 6,
            thickness: 1 + Math.random() * 4,
            speedMod: 0.4 + Math.random() * 1.4,
            particleChance: 0.01 + Math.random() * 0.04
        };
    }

    let me = generateUser();
    let users = {}; // id → params for remote users
    users[me.id] = me;

    // ─── State ───────────────────────────────────────────────────────
    let gridLines = [];
    let strokes = [];
    let particles = [];
    let noiseTexts = [];
    let glitchspeak = [];
    let archive = [];
    let shockwaves = [];
    let ghosts = [];
    let remnants = [];   // permanent particles from disintegrated strokes
    let connections = []; // links between remnants and new strokes
    let frameCounter = 0;
    let isDrawing = false;
    let currentStroke = null;
    let voiceReady = false;

    // ─── Persistent region (sound ghosting) ──────────────────────────
    let persistentBuffer = null;
    let currentRect = null;
    let rectActive = false;
    let lastRectTime = 0;
    let rectInterval = 1500;

    // ─── Disintegration timeline ────────────────────────────────────
    const STROKE_MS = 60000;       // 60s total lifetime
    const PH2_MS  = 30000;         // Phase 2 starts at 30s
    const PH3_MS  = 45000;         // Phase 3 starts at 45s
    function strokePhase(s) {
        let a = Date.now() - s.birth;
        if (a >= STROKE_MS) return 4;
        if (a >= PH3_MS)    return 3;
        if (a >= PH2_MS)    return 2;
        return 1;
    }
    function strokeAgePct(s) {
        return constrain((Date.now() - s.birth) / STROKE_MS, 0, 1);
    }

    // ─── Drawing modes ──────────────────────────────────────────────
    const MODES = {
        DRAW: 'draw', REFUSE: 'refuse', HAUNT: 'haunt',
        SPEAK: 'speak', GLITCH: 'glitch', ECHO: 'echo', ERASE: 'erase'
    };
    const MODE_COLORS = {
        draw: 'rgba(200,180,220,0.6)', refuse: 'rgba(200,80,80,0.7)',
        haunt: 'rgba(180,120,200,0.7)', speak: 'rgba(200,120,160,0.7)',
        glitch: 'rgba(120,200,120,0.7)', echo: 'rgba(200,180,80,0.7)',
        erase: 'rgba(120,40,40,0.8)'
    };
    let currentMode = MODES.DRAW;
    let modeTimer = 0; // for haunt/glitch mode animations

    // ─── Stroke types ───────────────────────────────────────────────
    const STROKE_TYPES = { DATA: 'data', TREMBLE: 'tremble', NOISE: 'noise', GHOST: 'ghost', RESISTANCE: 'resistance', GLITCHSPEAK: 'glitchspeak' };
    const STROKE_TYPE_LABELS = { data: 'd4ta', tremble: 'tr3mbl3', noise: 'n01s3', ghost: 'gh0st', resistance: 'r3s1st', glitchspeak: 'gl1tchsp34k' };
    const STROKE_TYPE_COLORS = {
        data: 'rgba(120,180,255,0.7)', tremble: 'rgba(200,180,120,0.7)',
        noise: 'rgba(180,120,120,0.7)', ghost: 'rgba(160,200,200,0.5)',
        resistance: 'rgba(200,120,80,0.7)', glitchspeak: 'rgba(200,160,200,0.7)'
    };
    const STROKE_TYPE_ORDER = ['data', 'tremble', 'noise', 'ghost', 'resistance', 'glitchspeak'];
    let currentStrokeType = STROKE_TYPES.DATA;

    // ─── Energy ──────────────────────────────────────────────────────
    let energy = 25;

    // ─── Region density (claiming resistance) ────────────────────────
    const REGION_SIZE = 200;
    let regionDensity = {};

    function getRegionKey(x, y) {
        return floor(x / REGION_SIZE) + ',' + floor(y / REGION_SIZE);
    }

    // ─── System reveal fragments (void) ──────────────────────────────
    function getSystemReveal() {
        let reveals = [
            'X: ' + floor(mouseX - scrollX) + ' Y: ' + floor(mouseY - scrollY),
            'users: ' + Object.keys(users).length + ' | strokes: ' + strokes.length,
            'ghost_' + me.id.slice(0, 4) + ' was here',
            'stroke.points.length > ' + floor(random(5, 50)),
            'decayRate: ' + CFG.decayRate,
            'cellSize: ' + CFG.cellSize + 'px',
            'energy: ' + floor(energy) + '%',
            'transform: ' + (currentStroke ? (currentStroke.voidState ? currentStroke.voidState.transformation : 'waiting') : 'idle'),
            'region: ' + getRegionKey(mouseX - scrollX, mouseY - scrollY),
            'frame: ' + frameCounter
        ];
        return reveals[floor(random(reveals.length))];
    }

    // ─── Context tracker (grid speech) ───────────────────────────────
    let lastContext = 'idle';
    let lastTransformationType = null;
    let resistanceTriggered = false;
    let resistanceTextTimer = 0;

    // ─── Glitch Rifts ──────────────────────────────────────────────
    let rifts = [];
    let riftTraces = [];
    let riftActiveAnim = null; // { x, y, type, timer }
    let riftNotificationTimer = 0;

    const RIFT_CONFIG = {
        code:         { color: [68, 204, 221], label: 'C0d3 R1ft',   emoji: '~' },
        ghost:        { color: [136, 68, 204], label: 'Gh0st R1ft',  emoji: '\u25C7' },
        connection:   { color: [221, 204, 68], label: 'C0nn3ct R1ft',emoji: '\u2248' },
        energy:       { color: [68, 221, 136], label: '3n3rgy R1ft', emoji: '\u2668' },
        resistance:   { color: [221, 68, 68],  label: 'R3s1st R1ft', emoji: '\u2718' },
        glitchspeak:  { color: [200, 200, 200],label: 'Gl1tchsp34k', emoji: '\u2733' }
    };

    function riftNearMouse() {
        let gx = mouseX - scrollX, gy = mouseY - scrollY;
        for (let r of rifts) {
            if (r.activated) continue;
            if (dist(r.x, r.y, gx, gy) < 100) return r;
        }
        return null;
    }

    // ─── Rift effect state ──────────────────────────────────────────
    let gridMode = 'normal';    // 'normal' | 'code'
    let gridModeTimer = 0;
    let fallingWords = [];
    let pulseWaves = [];        // { x, y, radius, maxRadius, life, maxLife }
    let connectionNodes = [];
    let connectionTimer = 0;
    let scarredRegions = [];    // { x, y, radius }
    let ghostSwarm = null;      // { x, y, timer, maxTimer, phase, scatter }

    // ─── Narrative messages (resistance/energy) ──────────────────────
    let narrativeTexts = [];

    function addNarrative(text, x, y) {
        narrativeTexts.push({ text, x, y, life: 60, maxLife: 60 });
        if (narrativeTexts.length > 20) narrativeTexts.shift();
    }

    function showNotification(text, duration) {
        try {
            let el = document.getElementById('rift-notification');
            if (el) { el.textContent = text; el.style.opacity = '1'; setTimeout(() => { if (el) el.style.opacity = '0'; }, duration || 3000); }
        } catch(e) { console.warn('notification err', e); }
    }

    // ─── Mode display ────────────────────────────────────────────────
    function updateModeDisplay() {
        let el = document.getElementById('mode-display');
        if (!el) return;
        let symbols = { draw: '\u25C9', refuse: '\u2718', haunt: '\u25C7', speak: '\u266B', glitch: '\u2206', echo: '\u2248', erase: '\u2717' };
        let typeLabel = STROKE_TYPE_LABELS[currentStrokeType] || 'd4ta';
        el.innerHTML = (symbols[currentMode] || '\u25C9') + ' ' + currentMode + ' <span style="color:' + (STROKE_TYPE_COLORS[currentStrokeType] || 'rgba(200,180,220,0.6)') + ';opacity:0.5">[' + typeLabel + ']</span>';
        el.style.color = MODE_COLORS[currentMode] || 'rgba(200,180,220,0.6)';
    }

    // ─── WebSocket (multi-user sync) ────────────────────────────────
    const WS_URL = window.location.origin === 'file://'
        ? 'ws://localhost:3001'
        : 'wss://glitch-prototype-production.up.railway.app';

    let socket = null;
    let wsReconnectTimer = null;
    let wsConnected = false;
    let wsRetryCount = 0;
    let strokeQueue = [];

    function flushStrokeQueue() {
        if (!socket || socket.readyState !== 1 || strokeQueue.length === 0) return;
        let batch = strokeQueue.splice(0);
        for (let s of batch) {
            socket.send(JSON.stringify({ type: 'stroke', data: s.serialize() }));
        }
    }

    function connectWS() {
        if (socket && socket.readyState <= 1) return;
        console.log('[WS] connecting to', WS_URL);
        try {
            socket = new WebSocket(WS_URL);
            socket.onopen = function() {
                console.log('[WS] connected');
                wsConnected = true;
                wsRetryCount = 0;
                socket.send(JSON.stringify({ type: 'join', id: me.id, params: me }));
                updateStatus();
                flushStrokeQueue();
                if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
            };
            socket.onmessage = function(e) {
                let d;
                try { d = JSON.parse(e.data); } catch (_) { return; }
                if (d.type === 'welcome') {
                    for (let uid in d.users) {
                        if (uid !== me.id && !users[uid]) {
                            users[uid] = d.users[uid];
                            users[uid].lastSeen = Date.now();
                        }
                    }
                    if (d.particles) {
                        for (let p of d.particles) {
                            if (!remnants.find(ex => ex.id === p.id)) {
                                remnants.push(p);
                            }
                        }
                    }
                    if (d.strokes) {
                        for (let raw of d.strokes) {
                            let s = Stroke.deserialize(raw);
                            if (s && !strokes.find(st => st.id === s.id)) {
                                strokes.push(s);
                            }
                        }
                        if (strokes.length > CFG.maxStrokes) strokes.splice(0, strokes.length - CFG.maxStrokes);
                    }
                    updateUserCount();
                    if (d.rifts) {
                        rifts = d.rifts.map(r => ({ ...r }));
                    }
                } else if (d.type === 'stroke') {
                    let s = Stroke.deserialize(d.data);
                    if (s && !strokes.find(st => st.id === s.id)) {
                        strokes.push(s);
                        if (strokes.length > CFG.maxStrokes) strokes.splice(0, strokes.length - CFG.maxStrokes);
                    }
                } else if (d.type === 'user-join') {
                    if (d.id !== me.id && !users[d.id]) {
                        users[d.id] = d.params;
                        users[d.id].lastSeen = Date.now();
                        updateUserCount();
                    }
                } else if (d.type === 'user-leave') {
                    if (d.id !== me.id && users[d.id]) {
                        delete users[d.id];
                        updateUserCount();
                    }
                } else if (d.type === 'reset') {
                    strokes = []; noiseTexts = []; particles = []; shockwaves = []; archive = [];
                    ghosts = []; regionDensity = {}; rifts = []; riftTraces = [];
                    remnants = []; connections = [];
                    if (d.rifts) { rifts = d.rifts.map(r => ({ ...r })); }
                } else if (d.type === 'decay') {
                    for (let id of d.expiredStrokeIds) {
                        let s = strokes.find(st => st.id === id);
                        if (s && ghosts.length < 200) {
                            ghosts.push(new Ghost(s));
                        }
                        if (currentStroke && currentStroke.id === id) currentStroke = null;
                    }
                    strokes = strokes.filter(st => !d.expiredStrokeIds.includes(st.id));
                    for (let p of d.particles) {
                        if (!remnants.find(ex => ex.id === p.id)) {
                            remnants.push(p);
                        }
                    }
                } else if (d.type === 'glitchspeak') {
                    for (let w of d.words) {
                        if (!glitchspeak.includes(w)) glitchspeak.push(w);
                    }
                    if (glitchspeak.length > 150) glitchspeak = glitchspeak.slice(-100);
                } else if (d.type === 'rifts-sync') {
                    let serverIds = d.rifts.map(r => r.id);
                    rifts = rifts.filter(r => serverIds.includes(r.id));
                    for (let sr of d.rifts) {
                        let existing = rifts.find(r => r.id === sr.id);
                        if (existing) { existing.activated = sr.activated; }
                        else { rifts.push({ ...sr }); }
                    }
                } else if (d.type === 'rift-discovered') {
                    let rift = rifts.find(r => r.id === d.rift.id);
                    if (rift) rift.activated = true;
                    let cfg = RIFT_CONFIG[d.rift.type];
                    let label = cfg ? cfg.label : 'R1ft';
                    let el = document.getElementById('rift-notification');
                    if (el) {
                        el.textContent = '\uD83C\uDF00 ' + label + ' d1sc0v3r3d at (' + Math.floor(d.rift.x) + ', ' + Math.floor(d.rift.y) + ')';
                        el.style.opacity = '1';
                        setTimeout(() => { if (el) el.style.opacity = '0'; }, 4000);
                    }
                } else if (d.type === 'energy-grant') {
                    try {
                        energy = min(25, energy + d.amount);
                        showNotification('\u26A1 +' + d.amount + ' 3n3rgy (r1ft sh4r3d)', 3000);
                    } catch(e) { console.warn('energy-grant err', e); }
                }
            };
            socket.onclose = function(e) {
                console.log('[WS] disconnected (code=' + e.code + ')');
                wsConnected = false;
                for (let uid in users) {
                    if (uid !== me.id) delete users[uid];
                }
                updateUserCount();
                updateStatus();
                wsRetryCount++;
                let delay = Math.min(3000 * wsRetryCount, 15000);
                if (!wsReconnectTimer) {
                    wsReconnectTimer = setTimeout(() => { wsReconnectTimer = null; connectWS(); }, delay);
                }
            };
            socket.onerror = function(e) {
                console.warn('[WS] error', e.type || e);
            };
        } catch (e) {
            console.error('[WS] exception', e);
        }
    }

    connectWS();

    setInterval(() => {
        if (socket && socket.readyState === 1) {
            socket.send(JSON.stringify({ type: 'ping', id: me.id }));
        }
        let now = Date.now();
        for (let uid in users) {
            if (uid !== me.id && users[uid].lastSeen && now - users[uid].lastSeen > 10000) {
                delete users[uid];
            }
        }
        updateUserCount();
    }, 3000);

    function broadcastStroke(s) {
        if (socket && socket.readyState === 1) {
            socket.send(JSON.stringify({ type: 'stroke', data: s.serialize() }));
        } else {
            strokeQueue.push(s);
            if (strokeQueue.length > 100) strokeQueue.shift();
        }
    }

    function broadcastGlitchspeak(word) {
        if (socket && socket.readyState === 1) {
            socket.send(JSON.stringify({ type: 'glitchspeak', words: [word] }));
        }
    }

    function updateStatus() {
        let statusEl = document.getElementById('status');
        let parts = [];
        if (!wsConnected) parts.push('\u26A0 ' + (wsRetryCount > 0 ? 'reconnecting' : 'offline'));
        if (wsConnected && wsRetryCount > 0) parts.push('reconnected');
        let names = Object.keys(users).filter(u => u !== me.id);
        if (names.length > 0) parts.push('others: ' + names.slice(0, 4).join(', ') + (names.length > 4 ? ' +' + (names.length - 4) : ''));
        statusEl.textContent = parts.join(' \u00B7 ');
        statusEl.style.color = wsConnected ? 'rgba(200,180,220,0.25)' : 'rgba(200,80,80,0.5)';
    }

    function updateUserCount() {
        let count = Object.keys(users).length;
        document.getElementById('userCount').textContent = count;
        document.getElementById('userLabel').textContent = me.id;
        updateStatus();
    }

    // ─── Glitchspeak ─────────────────────────────────────────────────
    function generateGlitchspeak(input) {
        let word = input || glitchspeak[Math.floor(Math.random() * glitchspeak.length)] || 'dr1ft';
        let chars = word.split('');
        const reps = { a: '4', e: '3', i: '1', o: '0', s: '5', t: '7', g: '9', b: '8', l: '1', r: '2' };
        for (let i = 0; i < chars.length; i++) {
            if (Math.random() < 0.35) {
                let c = chars[i].toLowerCase();
                if (reps[c]) chars[i] = reps[c];
            }
        }
        let result = chars.join('');
        if (!glitchspeak.includes(result)) glitchspeak.push(result);
        if (glitchspeak.length > 100) glitchspeak.splice(0, 10);
        return result;
    }

    function corruptText(text, rate) {
        rate = rate || 0.3;
        let chars = text.split('');
        const reps = { a: '4', e: '3', i: '1', o: '0', s: '5', t: '7' };
        const syms = ['\u2588', '\u2593', '?', '~', '#', '@', '%', '&'];
        for (let i = 0; i < chars.length; i++) {
            if (Math.random() < rate) {
                let c = chars[i].toLowerCase();
                if (reps[c]) chars[i] = reps[c];
                else if (Math.random() < 0.25) chars[i] = syms[Math.floor(Math.random() * syms.length)];
            }
        }
        return chars.join('');
    }

    // ─── Particle ────────────────────────────────────────────────────
    class Particle {
        constructor(x, y, vx, vy, life, size, color) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.life = life; this.maxLife = life;
            this.size = size;
            this.color = color;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.96; this.vy *= 0.96;
            this.life--; this.size *= 0.994;
        }
        get alive() { return this.life > 0 && this.size > 0.05; }
        get alpha() { return map(this.life, 0, this.maxLife, 0, 180); }
    }

    // ─── GridLine (world-space, fluid) ──────────────────────────────
    class GridLine {
        constructor(pos, isHorizontal) {
            this.pos = pos;
            this.isHorizontal = isHorizontal;
            this.distortion = 0;
            this.offset = 0;
            this.phase = Math.random() * Math.PI * 2;
            this.speed = 0.006 + Math.random() * 0.025;
            this.decay = 0;
            this.memory = Math.random() * 0.03;
            this.active = true;
            this.memoryTraces = [];
            this.maxMemoryTraces = 50;
            this.scarLevel = 0;
            this.communicateWord = null;
            this.communicateAlpha = 0;
        }
        update() {
            this.distortion *= (1 - 0.02);
            this.distortion = Math.max(this.distortion, this.memory);
            this.decay = Math.max(0, this.decay - 0.00015);
            this.phase += this.speed;
            this.offset = sin(this.phase) * this.distortion * 12 + sin(this.phase * 2.3) * this.distortion * 4;
            if (this.decay > 0.95) this.active = false;
            if (this.distortion < 0.001 && this.decay < 0.01) this.active = true;
            if (this.communicateWord) {
                this.communicateAlpha -= 0.4;
                if (this.communicateAlpha <= 0) { this.communicateWord = null; this.communicateAlpha = 0; }
            }
        }
        speak(word) {
            if (!this.active) return;
            this.communicateWord = word;
            this.communicateAlpha = 150;
        }
        applyDisturbance(mx, my, strength) {
            let d = this.isHorizontal ? abs(my - this.pos) : abs(mx - this.pos);
            if (d < 200) {
                let force = strength * (1 - d / 200) * (1 + sin(this.phase) * 0.3);
                this.distortion = Math.min(1, this.distortion + force * 0.5);
                this.decay = Math.min(1, this.decay + force * 0.06);
                this.active = true;
                this.memoryTraces.push(force);
                if (this.memoryTraces.length > this.maxMemoryTraces) this.memoryTraces.shift();
                this.scarLevel = min(1, this.memoryTraces.reduce((a, b) => a + b, 0) / 10);
            }
        }
        applyShockwave(sx, sy, radius, strength) {
            let d = this.isHorizontal ? abs(sy - this.pos) : abs(sx - this.pos);
            if (d < radius) {
                let force = strength * (1 - d / radius) * 0.6;
                this.distortion = Math.min(1, this.distortion + force);
                this.decay = Math.min(1, this.decay + force * 0.12);
                this.active = true;
            }
        }
        display() {
            if (!this.active) return;

            let screenPos, span;
            if (this.isHorizontal) {
                screenPos = this.pos + scrollY;
                if (screenPos < -10 || screenPos > height + 10) return;
                span = width;
            } else {
                screenPos = this.pos + scrollX;
                if (screenPos < -10 || screenPos > width + 10) return;
                span = height;
            }

            let alpha = map(this.distortion, 0, 1, 50, 8) * (1 - this.decay * 0.8);
            alpha = Math.max(alpha, 0);
            if (alpha < 2) return;

            let r = constrain(BASE.grid[0] - this.scarLevel * 60, 20, 255);
            let g = constrain(BASE.grid[1] - this.scarLevel * 40, 20, 255);
            let b = constrain(BASE.grid[2] + this.scarLevel * 30, 20, 255);

            stroke(r, g, b, alpha);
            strokeWeight(map(this.distortion, 0, 1, 0.3, 2.5));
            noFill();

            let segs = max(6, floor(span / 35));
            let sl = span / segs;

            beginShape();
            for (let i = 0; i <= segs; i++) {
                let nOff = noise(i * 0.2, this.phase) * this.distortion * 12;
                if (this.isHorizontal) {
                    vertex(i * sl, screenPos + this.offset + nOff);
                } else {
                    vertex(screenPos + this.offset + nOff, i * sl);
                }
            }
            endShape();

            // Grid communication: display glitchspeak word
            if (this.communicateWord && this.communicateAlpha > 0) {
                let tx, ty;
                if (this.isHorizontal) {
                    tx = width / 2 + sin(frameCount * 0.02 + this.phase) * 50;
                    ty = screenPos + this.offset - 10;
                } else {
                    tx = screenPos + this.offset + 10;
                    ty = height / 2 + cos(frameCount * 0.02 + this.phase) * 50;
                }
                fill(200, 180, 220, this.communicateAlpha);
                noStroke();
                textFont('Courier New');
                textSize(8);
                textAlign(CENTER, CENTER);
                text(this.communicateWord, tx, ty);
            }
        }
    }

    // ─── Stroke (click-drag drawing, per-user parameters) ───────────
    let strokeIdCounter = 0;

    class Stroke {
        constructor(userId, userParams, strokeType) {
            this.id = userId + '_' + (strokeIdCounter++);
            this.userId = userId;
            this.params = userParams;
            this.strokeType = strokeType || 'data';
            this.points = [];
            this.timestamp = Date.now();
            this.birth = Date.now();
            this.colorSeed = Math.random() * 1000;
            this.transformation = null;
            this.refused = false;
            this.artifacts = [];
            this.revealTimer = 0;
            this.voidState = null;
            this.dataTimer = 0;
            this.mutationPhase = Math.random() * 1000;
            this.glitchedAt70 = false;
            this.stutteredAt50 = false;
            this.skeletonShown = false;
            this._totalLength = 0;
            this._maxSpeed = 0;
            this._directionChanges = 0;
            this._prevDx = null;
            this._prevDy = null;
            this.nearRiftType = null;
            this.nearRiftPos = null;
            this.energyMul = energy < 30 ? max(0.2, energy / 30) : 1;
            if (this.strokeType === 'glitchspeak') {
                this.glitchspeakWord = generateGlitchspeak();
            }
        }
        addPoint(x, y) { this.points.push({ x, y }); }

        update() {
            if (this.voidState && this.voidState.active) {
                this.voidState.timer++;
                if (this.voidState.timer >= this.voidState.duration) {
                    this.voidState.active = false;
                }
            }
            if (this.transformation === 'mutation') {
                for (let i = 0; i < this.points.length; i++) {
                    let angle = noise(i * 0.1, frameCount * 0.008, this.mutationPhase) * TWO_PI * 2;
                    this.points[i].x += cos(angle) * 1.5;
                    this.points[i].y += sin(angle) * 1.5;
                }
                if (Math.random() < 0.01) {
                    let idx = floor(random(this.points.length));
                    let a = random(TWO_PI);
                    this.points[idx].x += cos(a) * 20;
                    this.points[idx].y += sin(a) * 20;
                }
            }
            if (this.dataTimer > 0) this.dataTimer--;
            if (this.revealTimer > 0) this.revealTimer--;
        }

        get alive() { return Date.now() - this.birth < STROKE_MS; }
        get alpha() {
            let a = Date.now() - this.birth;
            if (a < PH2_MS) return 200;
            if (a < PH3_MS) return Math.floor(map(a, PH2_MS, PH3_MS, 200, 100));
            return Math.floor(map(a, PH3_MS, STROKE_MS, 100, 20));
        }

        display() {
            if (this.points.length < 2) return;
            let a = this.alpha;

            let p = this.params;
            let col = p ? p.color : [120, 80, 200];
            let tremble = p ? p.tremble : 3;
            let thick = p ? p.thickness : 2.5;
            let speedMod = p ? p.speedMod : 1;
            let pChance = p ? p.particleChance : 0.02;

            // Energy affects drawing quality
            if (this.energyMul < 1) {
                thick *= 0.3 + this.energyMul * 0.7;
                tremble *= 0.5 + this.energyMul * 0.5;
                pChance *= this.energyMul;
                col = col.map(c => c * (0.3 + this.energyMul * 0.7));
            }

            let n = this.points.length;
            let agePct = strokeAgePct(this);
            let phase = strokePhase(this);

            // ── Void state: static noise that resolves ──
            let voidActive = this.voidState && this.voidState.active;
            let voidInstability = 0;
            if (voidActive) {
                voidInstability = 1 - this.voidState.timer / this.voidState.duration;
                // Deep void: render pure static noise, skip normal drawing
                if (voidInstability > 0.4) {
                    // Voice boost: loud speaking during void amazes the transformation
                    let voiceBoost = (voiceActive && frameCount - lastVoiceTime < 30) ? 1 + voiceVolumeSmooth * 2 : 1;
                    // Store on stroke so transformation uses it later
                    this.voiceVoidBoost = voiceBoost;
                    let jitterMag = (12 + voiceBoost * 20) * voidInstability;
                    let fillRate = voidInstability * 0.9 * voiceBoost;
                    for (let pt of this.points) {
                        if (Math.random() < fillRate) {
                            noStroke();
                            fill(
                                180 + random(-60 * voiceBoost, 60 * voiceBoost),
                                160 + random(-60 * voiceBoost, 60 * voiceBoost),
                                220 + random(-60 * voiceBoost, 60 * voiceBoost),
                                random(60, 180 * voiceBoost)
                            );
                            rect(pt.x + scrollX + random(-jitterMag, jitterMag), pt.y + scrollY + random(-jitterMag, jitterMag), random(1, 5 * voiceBoost), random(1, 5 * voiceBoost));
                        }
                    }
                    // System reveal text fragments (Menkman: glitch reveals hidden structures)
                    if (Math.random() < voidInstability * 0.08 * voiceBoost) {
                        let mid = this.points[floor(this.points.length / 2)];
                        if (mid) {
                            fill(180, 160, 200, random(40, 100 * voiceBoost));
                            noStroke();
                            textFont('Courier New');
                            textSize(7);
                            textAlign(CENTER, CENTER);
                            text(getSystemReveal(), mid.x + scrollX + random(-20, 20), mid.y + scrollY + random(-20, 20));
                        }
                    }
                    // Voice boost indicator — always visible when boost is active
                    if (voiceBoost > 1.5) {
                        let mid = this.points[floor(this.points.length / 2)];
                        if (mid) {
                            let px = mid.x + scrollX;
                            let py = mid.y + scrollY;
                            // Pulsing background glow
                            noStroke();
                            let glowR = 40 + sin(frameCount * 0.08) * 12;
                            fill(120, 60, 200, 30 + sin(frameCount * 0.06) * 15);
                            ellipse(px, py, glowR, glowR);
                            // Bright prominent text
                            fill(220, 140, 255, 160 + sin(frameCount * 0.1) * 60);
                            textFont('Courier New');
                            textSize(16 + sin(frameCount * 0.07) * 3);
                            textAlign(CENTER, CENTER);
                            text('\u266B v01c3 4mpl1f13d', px + sin(frameCount * 0.05) * 4, py - 8 + cos(frameCount * 0.04) * 4);
                            // Sub-label showing boost multiplier
                            fill(200, 120, 255, 100 + sin(frameCount * 0.08) * 40);
                            textSize(7);
                            text('x' + voiceBoost.toFixed(1) + ' 4mpl1fy', px, py + 18);
                        }
                        // Screen shake proportional to volume
                        screenShakeX += random(-voiceVolumeSmooth * 6, voiceVolumeSmooth * 6);
                        screenShakeY += random(-voiceVolumeSmooth * 6, voiceVolumeSmooth * 6);
                        // Full-screen bright flash
                        noStroke();
                        fill(180, 120, 255, 20 + voiceVolumeSmooth * 30);
                        rect(0, 0, width, height);
                        // Particle burst from stroke center
                        if (Math.random() < 0.3) {
                            let mid = this.points[floor(this.points.length / 2)];
                            if (mid) {
                                for (let i = 0; i < 3 + floor(voiceVolumeSmooth * 5); i++) {
                                    let ang = random(TWO_PI);
                                    let spd = 1 + voiceVolumeSmooth * 3;
                                    particles.push(new Particle(
                                        mid.x + scrollX + random(-5, 5), mid.y + scrollY + random(-5, 5),
                                        cos(ang) * spd, sin(ang) * spd,
                                        12 + floor(voiceVolumeSmooth * 20), random(1, 4),
                                        [200 + random(-40, 40), 120 + random(-40, 40), 255]
                                    ));
                                }
                            }
                        }
                    }
                    return;
                }
                // Late void: noise mixed with emerging stroke
                let lateVoiceBoost = (voiceActive && frameCount - lastVoiceTime < 30) ? 1 + voiceVolumeSmooth * 1.5 : 1;
                this.voiceVoidBoost = lateVoiceBoost;
                for (let pt of this.points) {
                    if (Math.random() < (1 - voidInstability) * 0.5 * lateVoiceBoost) {
                        noStroke();
                        fill(200, 180, 220, random(30, 90 * lateVoiceBoost));
                        rect(pt.x + scrollX + random(-8 * lateVoiceBoost, 8 * lateVoiceBoost), pt.y + scrollY + random(-8 * lateVoiceBoost, 8 * lateVoiceBoost), random(1, 3 * lateVoiceBoost), random(1, 3 * lateVoiceBoost));
                    }
                }
                // Show transformation type emerging (always visible when voice loud)
                let mid = this.points[floor(this.points.length / 2)];
                if (mid && (Math.random() < (1 - voidInstability) * 0.15 * lateVoiceBoost || (lateVoiceBoost > 1.5 && Math.random() < 0.4))) {
                    let metricsLabel = '';
                    let avgSpd = constrain(this._totalLength / max(1, this.points.length), 0, 30);
                    let spdLabel = avgSpd > 12 ? 'fast' : avgSpd > 5 ? 'medium' : 'slow';
                    let lenLabel = this.points.length > 40 ? 'long' : 'short';
                    let dirLabel = this._directionChanges > 5 ? 'erratic' : 'steady';
                    metricsLabel = spdLabel + ' \u00B7 ' + lenLabel + ' \u00B7 ' + dirLabel;
                    let tLabel = this.voidState ? this.voidState.transformation : '?';
                    let lateAlpha = lateVoiceBoost > 1.5 ? 120 + sin(frameCount * 0.08) * 40 : (1 - voidInstability) * 80;
                    fill(200, 180, 220, lateAlpha);
                    noStroke();
                    textFont('Courier New');
                    textSize(lateVoiceBoost > 1.5 ? 8 : 6);
                    textAlign(CENTER, CENTER);
                    text('\u2192 ' + tLabel.toUpperCase() + (lateVoiceBoost > 1.5 ? ' \u266B' : ''), mid.x + scrollX, mid.y + scrollY + 20);
                    fill(180, 160, 200, lateAlpha * 0.5);
                    textSize(lateVoiceBoost > 1.5 ? 7 : 6);
                    text(metricsLabel, mid.x + scrollX, mid.y + scrollY + 30);
                }
                // Voice boost glow in late void
                if (lateVoiceBoost > 1.5 && mid) {
                    noStroke();
                    fill(180, 120, 255, 20 + sin(frameCount * 0.06) * 10);
                    ellipse(mid.x + scrollX, mid.y + scrollY, 30 + lateVoiceBoost * 10, 30 + lateVoiceBoost * 10);
                }
            }

            // ── Resistance drift (applied each frame) ──
            if (this.transformation === 'resistance') {
                for (let gl of gridLines) {
                    for (let pt of this.points) {
                        let d = abs(gl.isHorizontal ? pt.y - gl.pos : pt.x - gl.pos);
                        if (d < 80) {
                            let force = (1 - d / 80) * 3;
                            let ang = gl.isHorizontal ? (Math.random() < 0.5 ? -HALF_PI : HALF_PI) : (Math.random() < 0.5 ? 0 : PI);
                            pt.x += cos(ang) * force;
                            pt.y += sin(ang) * force;
                        }
                    }
                }
                if (Math.random() < 0.02) {
                    let idx = floor(random(this.points.length));
                    let a = random(TWO_PI);
                    this.points[idx].x += cos(a) * random(20, 50);
                    this.points[idx].y += sin(a) * random(20, 50);
                }
            }

            // ── Structure reveal: flash data points ──
            if (this.revealTimer > 0) {
                let rAlpha = map(this.revealTimer, 0, 40, 0, 150);
                for (let pt of this.points) {
                    noStroke();
                    fill(180, 220, 255, rAlpha);
                    ellipse(pt.x + scrollX, pt.y + scrollY, 3, 3);
                }
            }

            // ── Age-based disintegration thresholds ──
            // Phase 2 start → glitch (tremble spike)
            if (phase >= 2 && !this.glitchedAt70) {
                this.glitchedAt70 = true;
                tremble *= 4;
            }
            // Phase 2 mid → stutter (repeat segment)
            let stutter = false;
            if (agePct > 0.6 && !this.stutteredAt50) {
                this.stutteredAt50 = true;
            }
            if (this.stutteredAt50 && Math.random() < 0.06) stutter = true;

            // Phase 3 start → show data skeleton
            if (phase >= 3 && !this.skeletonShown) {
                this.skeletonShown = true;
                this.dataTimer = 60;
            }

            // Void: rapid color shift
            let voidColorShift = 0;
            if (voidActive) voidColorShift = (Math.random() - 0.5) * voidInstability * 80;

            // ── Data transformation rendering ──
            if (this.transformation === 'data' || this.dataTimer > 0) {
                for (let i = 0; i < n; i += max(1, floor(n / 15))) {
                    let pt = this.points[i];
                    let dAlpha = this.dataTimer > 0 ? map(this.dataTimer, 60, 0, 120, 0) : 30;
                    let dSize = this.transformation === 'data' ? 3 + noise(i * 0.3, this.colorSeed) * 4 : 2;
                    noStroke();
                    fill(200, 180, 255, dAlpha);
                    ellipse(pt.x + scrollX, pt.y + scrollY, dSize, dSize);
                    if (this.dataTimer > 30 && Math.random() < 0.2) {
                        fill(160, 140, 200, dAlpha * 0.6);
                        textFont('Courier New');
                        textSize(7);
                        textAlign(LEFT, CENTER);
                        text(floor(pt.x) + ',' + floor(pt.y), pt.x + scrollX + 5, pt.y + scrollY);
                    }
                }
                if (this.transformation !== 'data') return; // data skeleton only
            }

            // ── Main rendering loop (branch on transformation vs stroke type) ──
            if (this.transformation) {
                // Transformation rendering (existing behavior)
                for (let i = 1; i < n; i++) {
                    let p1 = this.points[i - 1];
                    let p2 = this.points[i];

                    let breakChance = this.refused ? 0.5 : 0.25;
                    if (Math.random() < breakChance) continue;

                    let segDist = dist(p1.x, p1.y, p2.x, p2.y);
                    let speedFactor = constrain(segDist / 10, 0.3, 2.5) * speedMod;

                    let shift = noise(i * 0.15, this.colorSeed) * 50 - 25;
                    let r = constrain(col[0] + shift * random(0.8, 1.2) + voidColorShift, 20, 255);
                    let g = constrain(col[1] + shift * random(0.6, 1.4) + voidColorShift, 20, 255);
                    let b = constrain(col[2] + shift * random(0.8, 1.2) + voidColorShift, 20, 255);

                    if (this.transformation === 'mutation') {
                        let hueShift = sin(frameCount * 0.01 + i * 0.1 + this.mutationPhase) * 30;
                        r = constrain(r + hueShift, 20, 255);
                        g = constrain(g - hueShift * 0.5, 20, 255);
                        b = constrain(b + hueShift * 0.3, 20, 255);
                    }

                    let segThick = (thick * 0.4 + thick * 0.6 * speedFactor) * (0.5 + noise(i * 0.2, this.colorSeed + 100));
                    let activeTremble = tremble;
                    if (voidActive && Math.random() < voidInstability * 0.5) activeTremble *= 5;

                    let ns = this.colorSeed + i * 0.5;
                    let ageNoise = agePct * 5;
                    let ox1 = (noise(ns, ageNoise) - 0.5) * activeTremble * speedFactor;
                    let oy1 = (noise(ns, ageNoise + 50) - 0.5) * activeTremble * speedFactor;
                    let ox2 = (noise(ns + 0.5, ageNoise) - 0.5) * activeTremble * speedFactor;
                    let oy2 = (noise(ns + 0.5, ageNoise + 50) - 0.5) * activeTremble * speedFactor;

                    let segAlpha = a;
                    if (this.refused && Math.random() < 0.15) segAlpha = 0;
                    if (voidActive && Math.random() < voidInstability * 0.3) segAlpha = max(0, segAlpha - random(100));

                    stroke(r, g, b, segAlpha);
                    strokeWeight(max(0.3, segThick));
                    line(p1.x + scrollX + ox1, p1.y + scrollY + oy1, p2.x + scrollX + ox2, p2.y + scrollY + oy2);

                    if (stutter && i > 2) {
                        stroke(255, 255, 255, segAlpha * 0.3);
                        strokeWeight(1);
                        line(p1.x + scrollX + random(-4, 4), p1.y + scrollY + random(-4, 4),
                             this.points[i - 2].x + scrollX + random(-4, 4), this.points[i - 2].y + scrollY + random(-4, 4));
                    }

                    if (phase <= 1 && Math.random() < pChance * speedFactor && particles.length < CFG.particleCap) {
                        let angle = random(TWO_PI);
                        let spd = 0.5 + random() * 1.5;
                        particles.push(new Particle(p2.x, p2.y, cos(angle) * spd, sin(angle) * spd, 20 + floor(random(30)), random(0.5, 2), [r, g, b]));
                    }
                }
            } else {
                // Stroke type rendering (no transformation yet)
                switch (this.strokeType) {
                    case 'tremble': this._renderTrembleType(n, a, col, tremble, thick, speedMod, voidColorShift, voidActive); break;
                    case 'noise': this._renderNoiseType(n, a, col, thick, voidColorShift, voidActive); break;
                    case 'ghost': this._renderGhostType(n, a, col, thick, voidColorShift, voidActive); break;
                    case 'resistance': this._renderResistanceType(n, a, col, thick, tremble, speedMod, voidColorShift, voidActive); break;
                    case 'glitchspeak': this._renderGlitchspeakType(n, a, col); break;
                    default: this._renderDataType(n, a, col, thick, speedMod, voidColorShift, voidActive); break;
                }
            }

            // ── Collaborator artifacts ──
            for (let art of this.artifacts) {
                if (art.life <= 0) continue;
                art.life--;
                let artA = map(art.life, 0, art.maxLife, 0, 100);
                if (Math.random() < 0.3) {
                    noStroke();
                    fill(200, 180, 220, artA);
                    ellipse(art.x + scrollX + random(-2, 2), art.y + scrollY + random(-2, 2), art.size, art.size);
                }
            }

            // ── Phase 3: Disintegration (90-120s) ──
            if (phase === 3) {
                let disA = map(Date.now() - this.birth, PH3_MS, STROKE_MS, 0.5, 0.1);
                for (let i = 0; i < n; i += max(1, floor(n / 8))) {
                    let pt = this.points[i];
                    let shake = (1 - disA) * 8;
                    let sx = pt.x + scrollX + random(-shake, shake);
                    let sy = pt.y + scrollY + random(-shake, shake);
                    if (Math.random() < 0.3) continue;
                    noStroke();
                    fill(col[0], col[1], col[2], a * random(0.3, 0.8));
                    rect(sx, sy, random(1, 4), random(1, 4));
                }
            }

            // ── Rift-drawing interaction effects ──
            try {
                if (this.nearRiftType && this.nearRiftPos) {
                    let rx = this.nearRiftPos.x + scrollX;
                    let ry = this.nearRiftPos.y + scrollY;
                    let midPt = this.points[floor(n / 2)];
                    switch (this.nearRiftType) {
                        case 'code':
                            for (let i = 0; i < n; i += max(1, floor(n / 10))) {
                                let pt = this.points[i];
                                fill(80, 220, 255, a * 0.6);
                                noStroke();
                                textFont('Courier New');
                                textSize(6);
                                textAlign(LEFT, CENTER);
                                text(Math.floor(pt.x) + ',' + Math.floor(pt.y), pt.x + scrollX + 4, pt.y + scrollY);
                            }
                            break;
                        case 'ghost':
                            for (let i = 0; i < n; i += max(1, floor(n / 8))) {
                                let pt = this.points[i];
                                let wobbleX = sin(frameCount * 0.03 + i * 0.5 + this.colorSeed) * 3;
                                let wobbleY = cos(frameCount * 0.03 + i * 0.5 + this.colorSeed) * 3;
                                let ghostA2 = a * (0.3 + noise(i * 0.2, frameCount * 0.01) * 0.7);
                                noStroke();
                                fill(180, 140, 220, ghostA2 * 0.5);
                                ellipse(pt.x + scrollX + wobbleX, pt.y + scrollY + wobbleY, 4, 4);
                                if (Math.random() < 0.05 && particles.length < CFG.particleCap) {
                                    particles.push(new Particle(pt.x, pt.y, random(-1, 1), random(-1, 1), 15 + floor(random(20)), random(0.5, 1.5), [180, 140, 220]));
                                }
                            }
                            if (midPt) {
                                stroke(180, 140, 220, a * 0.15);
                                strokeWeight(0.5);
                                line(midPt.x + scrollX, midPt.y + scrollY, rx, ry);
                            }
                            break;
                        case 'connection':
                            stroke(80, 200, 255, a * 0.2);
                            strokeWeight(0.5);
                            for (let i = 0; i < n; i += 3) {
                                for (let j = i + 3; j < n; j += 3) {
                                    if (Math.random() < 0.85) continue;
                                    let p1 = this.points[i];
                                    let p2 = this.points[j];
                                    line(p1.x + scrollX, p1.y + scrollY, p2.x + scrollX, p2.y + scrollY);
                                }
                            }
                            if (midPt) {
                                stroke(80, 200, 255, a * 0.1);
                                strokeWeight(0.3);
                                for (let pt of this.points) {
                                    if (Math.random() < 0.95) continue;
                                    line(rx, ry, pt.x + scrollX, pt.y + scrollY);
                                }
                            }
                            break;
                        case 'energy':
                            for (let i = 0; i < n; i++) {
                                let pt = this.points[i];
                                let glow = 20 + sin(frameCount * 0.05 + i * 0.2) * 10;
                                noStroke();
                                fill(60, 221, 136, a * 0.15);
                                ellipse(pt.x + scrollX, pt.y + scrollY, glow, glow);
                                if (Math.random() < 0.02 && particles.length < CFG.particleCap) {
                                    particles.push(new Particle(pt.x, pt.y, random(-1.5, 1.5), random(-1.5, 1.5), 12 + floor(random(15)), random(0.5, 2), [60, 221, 136]));
                                }
                            }
                            break;
                        case 'resistance':
                            for (let i = 1; i < n; i++) {
                                let pt = this.points[i];
                                let distX = sin(frameCount * 0.04 + i * 0.3) * 4;
                                let distY = cos(frameCount * 0.04 + i * 0.3) * 4;
                                noStroke();
                                fill(200, 80, 80, a * 0.2);
                                rect(pt.x + scrollX + distX, pt.y + scrollY + distY, 3, 3);
                            }
                            break;
                        case 'glitchspeak':
                            for (let i = 0; i < n; i += max(1, floor(n / 6))) {
                                let pt = this.points[i];
                                let word = glitchspeak.length > 0 ? glitchspeak[floor(random(glitchspeak.length))] : generateGlitchspeak();
                                fill(200, 180, 220, a * 0.5 + sin(frameCount * 0.06 + i) * 0.3);
                                noStroke();
                                textFont('Courier New');
                                textSize(5 + sin(frameCount * 0.03 + i) * 2);
                                textAlign(CENTER, CENTER);
                                text(word, pt.x + scrollX + sin(frameCount * 0.05 + i * 0.3) * 5, pt.y + scrollY + cos(frameCount * 0.05 + i * 0.3) * 5);
                            }
                            if (midPt) {
                                stroke(200, 180, 220, a * 0.1);
                                strokeWeight(0.3);
                                line(midPt.x + scrollX, midPt.y + scrollY, rx, ry);
                            }
                            break;
                    }
                }
            } catch(e) {}
        }

        // ── Stroke type rendering helpers ──

        _renderDataType(n, a, col, thick, speedMod, voidColorShift, voidActive) {
            for (let i = 0; i < n; i++) {
                let pt = this.points[i];
                let dSize = (thick * 0.5 + noise(i * 0.3, this.colorSeed) * thick) * (0.8 + 0.4 * (i < n - 1 ? dist(pt.x, pt.y, this.points[i + 1].x, this.points[i + 1].y) / 8 : 1));
                let shift = noise(i * 0.15, this.colorSeed) * 50 - 25;
                let r = constrain(col[0] + shift, 20, 255);
                let g = constrain(col[1] + shift, 20, 255);
                let b = constrain(col[2] + shift, 20, 255);
                if (voidActive) { r += random(-voidColorShift, voidColorShift); g += random(-voidColorShift, voidColorShift); b += random(-voidColorShift, voidColorShift); }
                noStroke();
                fill(r, g, b, a);
                ellipse(pt.x + scrollX, pt.y + scrollY, dSize, dSize);
                if (Math.random() < 0.04) {
                    fill(160, 140, 200, a * 0.5);
                    textFont('Courier New');
                    textSize(6);
                    textAlign(LEFT, CENTER);
                    text(floor(pt.x) + ',' + floor(pt.y), pt.x + scrollX + 5, pt.y + scrollY);
                }
            }
        }

        _renderTrembleType(n, a, col, tremble, thick, speedMod, voidColorShift, voidActive) {
            for (let i = 1; i < n; i++) {
                let p1 = this.points[i - 1];
                let p2 = this.points[i];
                let segDist = dist(p1.x, p1.y, p2.x, p2.y);
                let speedFactor = constrain(segDist / 10, 0.3, 2.5) * speedMod;
                let angle = atan2(p2.y - p1.y, p2.x - p1.x);
                let sineDisp = sin(frameCount * 0.08 + i * 0.5 + this.colorSeed) * tremble * speedFactor * 3;
                let ox = cos(angle + HALF_PI) * sineDisp;
                let oy = sin(angle + HALF_PI) * sineDisp;
                let shift = noise(i * 0.15, this.colorSeed) * 50 - 25;
                let r = constrain(col[0] + shift, 20, 255);
                let g = constrain(col[1] + shift, 20, 255);
                let b = constrain(col[2] + shift, 20, 255);
                if (voidActive) { r += random(-voidColorShift, voidColorShift); g += random(-voidColorShift, voidColorShift); b += random(-voidColorShift, voidColorShift); }
                let segThick = (thick * 0.4 + thick * 0.6 * speedFactor) * (0.5 + noise(i * 0.2, this.colorSeed + 100));
                stroke(r, g, b, a);
                strokeWeight(max(0.3, segThick));
                line(p1.x + scrollX + ox, p1.y + scrollY + oy, p2.x + scrollX + ox, p2.y + scrollY + oy);
                // Occasional lurch
                if (Math.random() < 0.003) {
                    let la = random(TWO_PI);
                    let ld = random(8, 25);
                    stroke(255, 200, 180, a * 0.5);
                    line(p2.x + scrollX, p2.y + scrollY, p2.x + scrollX + cos(la) * ld, p2.y + scrollY + sin(la) * ld);
                }
            }
        }

        _renderNoiseType(n, a, col, thick, voidColorShift, voidActive) {
            for (let i = 0; i < n; i++) {
                let pt = this.points[i];
                let clusterSize = 3 + floor(noise(i * 0.2, this.colorSeed) * 6);
                let speedFactor = 1;
                if (i > 0) {
                    let d = dist(pt.x, pt.y, this.points[i - 1].x, this.points[i - 1].y);
                    speedFactor = constrain(d / 10, 0.3, 2.5);
                }
                clusterSize = max(2, floor(clusterSize * speedFactor));
                for (let j = 0; j < clusterSize; j++) {
                    let ox = (noise(i * 0.3 + j * 2, this.colorSeed) - 0.5) * thick * speedFactor * 3;
                    let oy = (noise(i * 0.3 + j * 2 + 50, this.colorSeed) - 0.5) * thick * speedFactor * 3;
                    let shift = noise(i * 0.15 + j, this.colorSeed) * 50 - 25;
                    let r = constrain(col[0] + shift, 20, 255);
                    let g = constrain(col[1] + shift, 20, 255);
                    let b = constrain(col[2] + shift, 20, 255);
                    let dotA = a * (0.3 + noise(i + j, this.colorSeed + 200) * 0.7);
                    let broken = Math.random() < 0.15;
                    if (broken) { r = constrain(r + 80, 20, 255); dotA *= 0.4; }
                    if (voidActive) { r += random(-voidColorShift, voidColorShift); g += random(-voidColorShift, voidColorShift); b += random(-voidColorShift, voidColorShift); }
                    noStroke();
                    fill(r, g, b, dotA);
                    ellipse(pt.x + scrollX + ox, pt.y + scrollY + oy, random(0.8, 2.5), random(0.8, 2.5));
                }
            }
        }

        _renderGhostType(n, a, col, thick, voidColorShift, voidActive) {
            let lagX = 0, lagY = 0;
            for (let i = 0; i < n; i++) {
                let pt = this.points[i];
                lagX += (pt.x - lagX) * 0.15;
                lagY += (pt.y - lagY) * 0.15;
                let ghostA = a * (0.2 + noise(i * 0.3, frameCount * 0.01 + this.colorSeed) * 0.6);
                let flicker = Math.random() < 0.12 ? 0 : 1;
                if (flicker === 0) continue;
                let shift = noise(i * 0.15, this.colorSeed) * 50 - 25;
                let r = constrain(col[0] + shift, 20, 255);
                let g = constrain(col[1] + shift, 20, 255);
                let b = constrain(col[2] + shift, 20, 255);
                if (voidActive) { r += random(-voidColorShift, voidColorShift); g += random(-voidColorShift, voidColorShift); b += random(-voidColorShift, voidColorShift); }
                let segThick = thick * 0.6 * (0.5 + noise(i * 0.2, this.colorSeed + 100));
                noStroke();
                fill(r, g, b, ghostA * flicker);
                ellipse(lagX + scrollX, lagY + scrollY, segThick, segThick);
                // Occasional full fade gap
                if (Math.random() < 0.08) i += 1 + floor(random(2));
            }
        }

        _renderResistanceType(n, a, col, thick, tremble, speedMod, voidColorShift, voidActive) {
            for (let i = 1; i < n; i++) {
                let p1 = this.points[i - 1];
                let p2 = this.points[i];
                let segDist = dist(p1.x, p1.y, p2.x, p2.y);
                let speedFactor = constrain(segDist / 10, 0.3, 2.5) * speedMod;
                let dx = p2.x - p1.x, dy = p2.y - p1.y;
                // Grid repulsion
                for (let gl of gridLines) {
                    if (!gl.active || gl.scarLevel < 0.2) continue;
                    let d = abs(gl.isHorizontal ? p2.y - gl.pos : p2.x - gl.pos);
                    if (d < 80) {
                        let force = (1 - d / 80) * gl.scarLevel * 3;
                        let ang = gl.isHorizontal ? (Math.random() < 0.5 ? -HALF_PI : HALF_PI) : (Math.random() < 0.5 ? 0 : PI);
                        dx += cos(ang) * force;
                        dy += sin(ang) * force;
                    }
                }
                let shift = noise(i * 0.15, this.colorSeed) * 50 - 25;
                let r = constrain(col[0] + shift, 20, 255);
                let g = constrain(col[1] + shift, 20, 255);
                let b = constrain(col[2] + shift, 20, 255);
                if (voidActive) { r += random(-voidColorShift, voidColorShift); g += random(-voidColorShift, voidColorShift); b += random(-voidColorShift, voidColorShift); }
                let segThick = (thick * 0.4 + thick * 0.6 * speedFactor) * (0.5 + noise(i * 0.2, this.colorSeed + 100));
                let activeTremble = tremble * 0.5 + glitchspeak.length * 0.05;
                let ox = (noise(i * 0.3, this.colorSeed + 50) - 0.5) * activeTremble * speedFactor;
                let oy = (noise(i * 0.3, this.colorSeed + 100) - 0.5) * activeTremble * speedFactor;
                stroke(r, g, b, a);
                strokeWeight(max(0.3, segThick));
                line(p1.x + scrollX + ox, p1.y + scrollY + oy, p1.x + scrollX + dx + ox, p1.y + scrollY + dy + oy);
                if (Math.random() < 0.05) {
                    noStroke();
                    fill(200, 120, 80, a * 0.3);
                    ellipse(p2.x + scrollX + random(-6, 6), p2.y + scrollY + random(-6, 6), 4, 4);
                }
            }
        }

        _renderGlitchspeakType(n, a, col) {
            let word = this.glitchspeakWord || 'gl1tch';
            if (n < 2) return;
            let step = max(1, floor(n / word.length));
            for (let i = 0; i < word.length && i * step < n; i++) {
                let idx = i * step;
                let pt = this.points[idx];
                let char = word[i];
                let angle = 0;
                if (idx + 1 < n) {
                    angle = atan2(this.points[idx + 1].y - pt.y, this.points[idx + 1].x - pt.x);
                }
                push();
                translate(pt.x + scrollX, pt.y + scrollY);
                rotate(angle);
                let shift = noise(i * 0.3, this.colorSeed) * 40 - 20;
                let r = constrain(col[0] + shift + random(-20, 20), 20, 255);
                let g = constrain(col[1] + shift + random(-20, 20), 20, 255);
                let b = constrain(col[2] + shift + random(-20, 20), 20, 255);
                fill(r, g, b, a);
                noStroke();
                textFont('Courier New');
                textSize(8 + noise(i * 0.2, this.colorSeed) * 4);
                textAlign(CENTER, CENTER);
                let corrupt = Math.random() < 0.2;
                text(corrupt ? corruptText(char, 0.8) : char, random(-2, 2), random(-2, 2));
                pop();
                if (Math.random() < 0.1) {
                    noStroke();
                    fill(180, 160, 200, a * 0.3);
                    textFont('Courier New');
                    textSize(5);
                    textAlign(CENTER, CENTER);
                    text(corruptText(word, 0.6), pt.x + scrollX + random(-10, 10), pt.y + scrollY + random(6, 12));
                }
            }
        }
        serialize() {
            return {
                id: this.id, userId: this.userId, params: this.params,
                points: this.points, timestamp: this.timestamp,
                birth: this.birth,
                transformation: this.transformation, refused: this.refused,
                artifacts: this.artifacts,
                strokeType: this.strokeType, glitchspeakWord: this.glitchspeakWord
            };
        }

        static deserialize(d) {
            let s = new Stroke(d.userId, d.params, d.strokeType || 'data');
            s.id = d.id;
            s.points = d.points;
            s.timestamp = d.timestamp;
            s.birth = d.birth || d.timestamp || Date.now();
            s.transformation = d.transformation || null;
            s.refused = d.refused || false;
            s.artifacts = d.artifacts || [];
            s.revealTimer = 0;
            s.strokeType = d.strokeType || 'data';
            s.glitchspeakWord = d.glitchspeakWord || null;
            return s;
        }
    }

    // ─── NoiseText ───────────────────────────────────────────────────
    class NoiseText {
        constructor(x, y, text, type) {
            this.text = text || '~';
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 0.25;
            this.vy = (Math.random() - 0.5) * 0.25;
            this.type = type || 'generated';
            this.decay = 0;
            this.corruption = 0;
            this.letters = this.text.split('');
            this.phase = Math.random() * Math.PI * 2;
            this.baseAlpha = 200;
            this.color = type === 'voice' ? BASE.voice : type === 'keyboard' ? BASE.keyboard : BASE.grid;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vx += (Math.random() - 0.5) * 0.008;
            this.vy += (Math.random() - 0.5) * 0.008;
            this.vx *= 0.999; this.vy *= 0.999;
            this.decay += CFG.decayRate * 0.5;
            this.corruption += 0.002;
            this.phase += 0.01;
            if (this.corruption > Math.random() * 0.3 + 0.1) {
                let idx = Math.floor(Math.random() * this.letters.length);
                let syms = ['\u2588', '\u2593', '?', '~', '#', '@', '%', '&'];
                if (Math.random() < 0.5) {
                    let reps = { a: '4', e: '3', i: '1', o: '0', s: '5', t: '7' };
                    let c = this.letters[idx].toLowerCase();
                    if (reps[c]) this.letters[idx] = reps[c];
                    else this.letters[idx] = syms[Math.floor(Math.random() * syms.length)];
                } else {
                    this.letters[idx] = syms[Math.floor(Math.random() * syms.length)];
                }
                this.corruption = 0;
            }
        }
        get alive() { return this.decay < 1.8; }
        display() {
            let a = map(this.decay, 0, 1.8, this.baseAlpha, 5);
            if (a < 2) return;
            push();
            translate(this.x, this.y);
            rotate(sin(this.phase * 0.5) * 0.02);
            textFont('Courier New');
            textSize(11);
            textAlign(LEFT, CENTER);
            for (let i = 0; i < this.letters.length; i++) {
                let ch = this.letters[i];
                let ca = a * (1 - (i / this.letters.length) * 0.2);
                let ox = (Math.random() - 0.5) * this.corruption * 2;
                let oy = (Math.random() - 0.5) * this.corruption * 2;
                fill(this.color[0], this.color[1], this.color[2], ca);
                text(ch, i * 7 + ox, oy);
            }
            pop();
        }
    }

    // ─── Shockwave ───────────────────────────────────────────────────
    class Shockwave {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.radius = 0;
            this.maxRadius = 250;
            this.strength = 1;
            this.life = 40;
            this.maxLife = 40;
        }
        update() {
            this.radius += this.maxRadius / 35;
            this.strength *= 0.93;
            this.life--;
            for (let gl of gridLines) gl.applyShockwave(this.x, this.y, this.radius, this.strength * 0.3);
        }
        get alive() { return this.life > 0; }
        display() {
            let a = map(this.life, 0, this.maxLife, 0, 60);
            if (a < 1) return;
            noFill();
            stroke(BASE.grid[0], BASE.grid[1], BASE.grid[2], a);
            strokeWeight(0.5);
            ellipse(this.x + scrollX, this.y + scrollY, this.radius * 2);
        }
    }

    // ─── Archive ─────────────────────────────────────────────────────
    class ArchiveLayer {
        constructor(source) {
            this.points = [];
            for (let s of source) {
                for (let p of s.points) this.points.push({ x: p.x, y: p.y });
                if (this.points.length > 100) break;
            }
            this.decay = 0;
            this.active = true;
        }
        update() { this.decay += 0.0003; if (this.decay > 2) this.active = false; }
        get alpha() { return map(this.decay, 0, 2, 18, 0); }
        display() {
            if (!this.active) return;
            let a = this.alpha;
            if (a < 0.3) return;
            let c = BASE.ghost;
            for (let p of this.points) {
                if (Math.random() > 0.4) continue;
                noStroke();
                fill(c[0], c[1], c[2], a * (0.5 + Math.random() * 0.5));
                ellipse(p.x + scrollX, p.y + scrollY, 1.2, 1.2);
            }
        }
    }

        // ─── Energy low warning text ───
        if (energy < 20 && frameCounter % 60 < 30) {
            let warnAlpha = map(energy, 0, 20, 120, 0);
            fill(200, 80, 80, warnAlpha);
            noStroke();
            textFont('Courier New');
            textSize(9);
            textAlign(CENTER, CENTER);
            text('3n3rgy l0w', width / 2, 80);
        }

        // ─── Ghost (haunting) ────────────────────────────────────────────
    const MAX_GHOSTS = 500;

    class Ghost {
        constructor(stroke) {
            this.points = stroke.points.map(p => ({ x: p.x, y: p.y }));
            this.color = stroke.params ? stroke.params.color : [120, 80, 200];
            this.birth = Date.now();
            this.flareTimer = floor(random(300, 900));
            this.flaring = false;
            this.flareDuration = 0;
            this.age = 0;
            this.word = null;
            this.wordAlpha = 0;
            this.wordTimer = 0;
        }
        update() {
            this.age++;
            this.flareTimer--;
            if (this.flareTimer <= 0 && !this.flaring) {
                this.flaring = true;
                this.flareDuration = 20 + floor(random(30));
                this.flareTimer = floor(random(600, 1800));
            }
            if (this.flaring) {
                this.flareDuration--;
                if (this.flareDuration <= 0) this.flaring = false;
            }
            // Occasional glitchspeak word
            if (this.word) {
                this.wordTimer--;
                if (this.wordTimer <= 0) { this.word = null; this.wordAlpha = 0; }
            } else if (Math.random() < 0.002) {
                let mid = this.points[floor(this.points.length / 2)];
                if (mid) {
                    this.word = generateGlitchspeak();
                    this.wordAlpha = 100;
                    this.wordTimer = 30 + floor(random(30));
                }
            }
        }
        get alpha() { return this.flaring ? 80 : 15; }
        display() {
            let a = this.alpha;
            for (let pt of this.points) {
                if (Math.random() > 0.3) continue;
                let nx = noise(pt.x * 0.01, pt.y * 0.01, frameCount * 0.0005) * 5 - 2.5;
                let ny = noise(pt.x * 0.01 + 100, pt.y * 0.01 + 100, frameCount * 0.0005) * 5 - 2.5;
                noStroke();
                fill(this.color[0], this.color[1], this.color[2], a * (0.5 + Math.random() * 0.5));
                ellipse(pt.x + scrollX + nx, pt.y + scrollY + ny, 1, 1);
            }
            // Ghost glitchspeak word
            if (this.word && this.wordAlpha > 0) {
                let mid = this.points[floor(this.points.length / 2)];
                if (mid) {
                    fill(180, 160, 220, this.wordAlpha);
                    noStroke();
                    textFont('Courier New');
                    textSize(8);
                    textAlign(CENTER, CENTER);
                    let wx = mid.x + scrollX + noise(mid.x * 0.1, this.age * 0.01) * 10 - 5;
                    let wy = mid.y + scrollY + noise(mid.y * 0.1, this.age * 0.01 + 100) * 10 - 5;
                    text(this.word, wx, wy);
                    this.wordAlpha *= 0.97;
                }
            }
        }
        getForceAt(x, y) {
            let fx = 0, fy = 0;
            for (let pt of this.points) {
                let d = dist(x, y, pt.x, pt.y);
                if (d < 80 && d > 0) {
                    let f = (80 - d) / 80 * 0.15;
                    fx += (pt.x - x) / d * f;
                    fy += (pt.y - y) / d * f;
                }
            }
            return { x: fx, y: fy };
        }
    }

    // ─── Helpers ─────────────────────────────────────────────────────
    function initGrid() {
        gridLines = [];
        for (let x = -GRID_EXTENT; x <= GRID_EXTENT; x += CFG.cellSize) {
            gridLines.push(new GridLine(x, false));
        }
        for (let y = -GRID_EXTENT; y <= GRID_EXTENT; y += CFG.cellSize) {
            gridLines.push(new GridLine(y, true));
        }
    }

    function createNoiseText(x, y, text, type) {
        if (noiseTexts.length >= CFG.maxNoiseTexts) noiseTexts.shift();
        noiseTexts.push(new NoiseText(x, y, text, type));
    }

    function spawnInitialNoise() {
        let words = ['dr1ft', 'v01d', 'gr1d', 'tr4c3', 'n0153', 'gh0st', 'd3c4y', 'p4l1mp53st'];
        for (let i = 0; i < 4; i++) {
            createNoiseText(random(width), random(height), words[i], 'generated');
        }
    }

    // ─── Voice ───────────────────────────────────────────────────────
    let recognition = null;

    function startVoice() {
        if (voiceReady) return;
        let vsEl = document.getElementById('voice-status');
        startVoiceAnalysis();
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { voiceReady = true; if (vsEl) vsEl.textContent = 'v01c3: unsupp0rt3d'; return; }
        try {
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onresult = function(event) {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        let text = event.results[i][0].transcript.trim();
                        if (text.length > 0) handleVoice(text);
                    }
                }
            };
            recognition.onerror = function(e) {
                if (e.error === 'not-allowed') { voiceReady = true; return; }
                setTimeout(() => { try { if (recognition) recognition.start(); } catch (e) {} }, 2000);
            };
            recognition.start();
            voiceReady = true;
        } catch (e) { voiceReady = true; }
    }

    // ─── Voice Analysis (Web Audio API) ────────────────────────────
    let audioCtx = null;
    let analyser = null;
    let audioDataTime = null;
    let audioDataFreq = null;
    let voiceVolume = 0;
    let voicePitch = 0;
    let voiceVolumeSmooth = 0;
    let lastVoiceTime = 0;
    let voiceActive = false;
    let voiceMarks = [];
    const VOICE_MARK_LIFETIME = 60;

    function startVoiceAnalysis() {
        if (audioCtx) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return;
        }
        let vsEl = document.getElementById('voice-status');
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                let src = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                src.connect(analyser);
                audioDataTime = new Uint8Array(analyser.fftSize);
                audioDataFreq = new Uint8Array(analyser.frequencyBinCount);
                if (vsEl) { vsEl.textContent = 'v01c3: r3ady'; vsEl.style.opacity = '0.5'; }
            }).catch(() => { if (vsEl) { vsEl.textContent = 'v01c3: n0 m1c'; vsEl.style.opacity = '0.3'; } });
        } catch (e) {}
    }

    function getVolume() {
        if (!analyser || !audioDataTime) return voiceVolumeSmooth;
        analyser.getByteTimeDomainData(audioDataTime);
        let sum = 0;
        for (let i = 0; i < audioDataTime.length; i++) {
            let val = audioDataTime[i] / 128 - 1;
            sum += val * val;
        }
        let rms = Math.min(1, Math.sqrt(sum / audioDataTime.length) * 2);
        voiceVolumeSmooth = voiceVolumeSmooth * 0.7 + rms * 0.3;
        return voiceVolumeSmooth;
    }

    function getPitch() {
        if (!analyser || !audioDataFreq || !audioCtx) return voicePitch;
        analyser.getByteFrequencyData(audioDataFreq);
        let maxVal = 0, maxIdx = 0;
        for (let i = 0; i < audioDataFreq.length; i++) {
            if (audioDataFreq[i] > maxVal) {
                maxVal = audioDataFreq[i];
                maxIdx = i;
            }
        }
        if (maxVal < 20) return voicePitch;
        let pitch = maxIdx * audioCtx.sampleRate / analyser.fftSize;
        voicePitch = voicePitch * 0.6 + pitch * 0.4;
        return voicePitch;
    }



    function handleVoice(text) {
        // 1. Voice analysis
        let volume = getVolume();
        let pitch = getPitch();
        let words = text.split(/\s+/).filter(w => w.length > 0);
        let wordCount = words.length;
        console.log('[voice] heard:', text, 'vol:', volume.toFixed(2), 'pitch:', pitch.toFixed(0));
        let wordsPerSec = wordCount / max(1, text.length / 15);
        let density = constrain(wordsPerSec * 2, 2, 12);
        voiceActive = true;
        lastVoiceTime = frameCount;

        // 2. Generate glitchspeak from spoken text
        let firstWord = words[0] || '~';
        let corrupted = corruptText(text, 0.4);
        let glitchWord = generateGlitchspeak(firstWord);
        broadcastGlitchspeak(glitchWord);

        // 3. Grid disturbance (voice disturbs the grid)
        let gx = mouseX - scrollX, gy = mouseY - scrollY;
        let disturbRadius = map(volume, 0, 1, 60, 250, true);
        let disturbStrength = map(volume, 0, 1, 0.2, 1, true);
        for (let gl of gridLines) gl.applyDisturbance(gx, gy, disturbStrength);
        // Additional disturbance at offset points for a full "ring"
        for (let a = 0; a < TWO_PI; a += PI / 3) {
            let dx = gx + cos(a) * disturbRadius * 0.5;
            let dy = gy + sin(a) * disturbRadius * 0.5;
            for (let gl of gridLines) gl.applyDisturbance(dx, dy, disturbStrength * 0.4);
        }

        // 4. Ghost interaction (voice disturbs ghosts)
        let ghostRadius = map(volume, 0, 1, 100, 350, true);
        for (let g of ghosts) {
            if (g.points.length === 0) continue;
            let mid = g.points[floor(g.points.length / 2)];
            if (mid && dist(mid.x, mid.y, gx, gy) < ghostRadius) {
                let gDist = 1 - dist(mid.x, mid.y, gx, gy) / ghostRadius;
                if (gDist > 0.3 && Math.random() < gDist) {
                    g.flaring = true;
                    g.flareDuration = max(g.flareDuration || 0, floor(20 + gDist * 40));
                }
            }
        }

        // 5. Energy consumption (voice as labor)
