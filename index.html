        let energyCost = volume * 2 + wordCount * 0.1;
        energy = max(0, energy - energyCost);

        // 6. Generate voice marks using current stroke type (queued for draw loop)
        let markCount = min(wordCount * 2 + floor(density), 20);
        let pitchNorm = pitch > 0 ? constrain(pitch / 800, 0, 1) : random();
        let isSpeakMode = currentMode === MODES.SPEAK;
        if (isSpeakMode || frameCounter % 2 === 0) {
            for (let i = 0; i < markCount; i++) {
                let mx = gx + random(-80 - volume * 60, 80 + volume * 60);
                let my = gy + random(-80 - volume * 60, 80 + volume * 60);
                let markSize = map(volume, 0, 1, 2, 18, true) * (0.5 + random() * 0.7);
                if (energy < 20) markSize *= 0.5;
                let r = constrain((1 - pitchNorm) * 220 + 35, 20, 255);
                let gn = constrain(100 + noise(i * 0.3) * 80 - volume * 40, 20, 255);
                let b = constrain(pitchNorm * 220 + 35, 20, 255);
                let markAlpha = random(80, 160) * (energy < 20 ? 0.5 : 1);
                voiceMarks.push({
                    type: currentStrokeType, x: mx, y: my, size: markSize,
                    r, g: gn, b, alpha: markAlpha, life: VOICE_MARK_LIFETIME
                });
            }
            // Corrupted transcript (also queued)
            voiceMarks.push({
                type: '_transcript', text: text,
                x: mouseX - scrollX, y: mouseY - scrollY + 22,
                alpha: 25 + volume * 20, life: VOICE_MARK_LIFETIME
            });
        }

        // 7. Shockwave (voice as a physical force)
        let sw = new Shockwave(gx + random(-50, 50), gy + random(-50, 50));
        sw.maxRadius = 200 + volume * 300;
        sw.life = 40 + floor(volume * 30);
        sw.maxLife = sw.life;
        shockwaves.push(sw);

        // 8. Grid speech response (grid "hears" voice)
        if (volume > 0.3 || wordCount > 3) {
            let responses = ['h34rd', 'v01c3', '3ch0', 'sp34k', 'l1st3n', 'r3ply', 'h34r', 'y3s'];
            let respWord = generateGlitchspeak(responses[floor(random(responses.length))]);
            let line = gridLines[floor(random(gridLines.length))];
            if (line) line.speak(respWord);
        }

        // 9. Create noise text for voice
        for (let i = 0; i < min(3 + floor(volume * 3), 6); i++) {
            let t = new NoiseText(
                mouseX + random(-200, 200), mouseY + random(-200, 200),
                i === 0 ? '\u2726 ' + glitchWord + ' \u2726' : generateGlitchspeak(corrupted.split(/\s+/)[i % max(1, words.length)] || 'v01d'),
                'voice'
            );
            if (noiseTexts.length >= CFG.maxNoiseTexts) noiseTexts.shift();
            noiseTexts.push(t);
        }
    }

    // ─── p5: setup ──────────────────────────────────────────────────
    function setup() {
        createCanvas(windowWidth, windowHeight);
        persistentBuffer = createGraphics(windowWidth, windowHeight);
        pixelDensity(1);
        colorMode(RGB);
        textFont('Courier New');

        strokes = [];
        remnants = [];
        connections = [];
        glitchspeak = [
            'gr1dfl0w', 'tr4c3f0ss1l', 'n0153', 'dr1ft',
            'p4l1mp53st', 'gh0st1ng', '3ncrypt10n', 'r3fus4l',
            'v01d', 'd3c4y', 'p4rt1cl3', 'd1sturb4nc3'
        ];

        initGrid();
        spawnInitialNoise();
        updateUserCount();
    }

    // ─── p5: draw ───────────────────────────────────────────────────
    function draw() {
        frameCounter++;

        // ── Rift proximity shimmer ──
        let nearRift = riftNearMouse();
        if (nearRift && frameCounter % 3 === 0) {
            let gx = mouseX - scrollX, gy = mouseY - scrollY;
            let cfg = RIFT_CONFIG[nearRift.type];
            let distStr = 0.15 + sin(frameCount * 0.05) * 0.1;
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, distStr);
            if (cfg) {
                noStroke();
                let a = 20 + sin(frameCount * 0.06) * 10;
                fill(cfg.color[0], cfg.color[1], cfg.color[2], a);
                ellipse(mouseX, mouseY, 80 + sin(frameCount * 0.04) * 20, 80 + sin(frameCount * 0.04) * 20);
            }
        }

        // ─── Save persistent region buffer (before fade) ───
        if (rectActive && currentRect && persistentBuffer) {
            let ctx = persistentBuffer.drawingContext;
            ctx.drawImage(drawingContext.canvas, 0, 0);
        }

        if (frameCount < 5) {
            background(BASE.bg[0], BASE.bg[1], BASE.bg[2]);
        } else {
            noStroke();
            fill(BASE.bg[0], BASE.bg[1], BASE.bg[2], 16);
            rect(0, 0, width, height);
        }
        // ─── Restore persistent region (undo fade inside rect) ───
        if (rectActive && currentRect && persistentBuffer) {
            let r = currentRect;
            drawingContext.drawImage(persistentBuffer.drawingContext.canvas,
                r.x, r.y, r.w, r.h, r.x, r.y, r.w, r.h);
        }

        // ─── Voice status UI ───
        let vsEl = document.getElementById('voice-status');
        if (vsEl) {
            if (audioCtx && analyser) {
                let speaking = voiceVolumeSmooth > 0.08;
                let speechReady = voiceReady && recognition !== null;
                if (speaking) vsEl.textContent = '\u266B v01c3';
                else if (speechReady) vsEl.textContent = 'v01c3: r3ady';
                else vsEl.textContent = 'v01c3: ...';
                vsEl.style.opacity = speaking ? '1' : '0.4';
            } else {
                vsEl.textContent = 'v01c3: ...';
                vsEl.style.opacity = '0.2';
            }
        }

        // ─── Continuous energy drain + slow regen ───
        energy -= 0.05;
        energy += 0.005;
        if (energy > 25) energy = 25;
        if (energy < 0) energy = 0;

        // ─── Continuous voice detection + generative effects ───
        getVolume();
        let speakingNow = voiceVolumeSmooth > 0.08;
        if (speakingNow) {
            voiceActive = true;
            lastVoiceTime = frameCount;
            let gx = mouseX - scrollX, gy = mouseY - scrollY;
            let vol = voiceVolumeSmooth;
            let pitchN = voicePitch > 0 ? constrain(voicePitch / 800, 0, 1) : 0.5;

            // Energy drain (voice as labor)
            let energyCost = vol * 2;
            energy = max(0, energy - energyCost * 0.02);

            // Grid disturbance (voice as resistance) — every 6 frames
            if (frameCounter % 6 === 0) {
                let distStr = map(vol, 0, 1, 0.15, 0.7, true);
                for (let gl of gridLines) gl.applyDisturbance(gx, gy, distStr);
                for (let a = 0; a < TWO_PI; a += PI / 3) {
                    let dx = gx + cos(a) * (50 + vol * 100);
                    let dy = gy + sin(a) * (50 + vol * 100);
                    for (let gl of gridLines) gl.applyDisturbance(dx, dy, distStr * 0.3);
                }
            }

            // Ghost flaring (voice as haunting) — every 10 frames
            if (frameCounter % 10 === 0) {
                let gRad = 80 + vol * 200;
                for (let g of ghosts) {
                    if (g.points.length === 0) continue;
                    let mid = g.points[floor(g.points.length / 2)];
                    if (mid && dist(mid.x, mid.y, gx, gy) < gRad) {
                        let gDist = 1 - dist(mid.x, mid.y, gx, gy) / gRad;
                        if (gDist > 0.2 && Math.random() < gDist * 0.3) {
                            g.flaring = true;
                            g.flareDuration = max(g.flareDuration || 0, floor(10 + gDist * 30));
                        }
                    }
                }
            }

            // Grid speech (voice as conversation) — occasional
            if (frameCounter % 60 === 0 && vol > 0.25 && Math.random() < 0.3) {
                let responses = ['h34rd', 'v01c3', '3ch0', 'sp34k', 'l1st3n', 'r3ply', 'h34r', 'y3s', 'n0153', 'r3s1st'];
                let respWord = generateGlitchspeak(responses[floor(random(responses.length))]);
                let line = gridLines[floor(random(gridLines.length))];
                if (line) line.speak(respWord);
            }

            // Generate voice marks from volume every ~4 frames
            if (frameCounter % 4 === 0 && voiceMarks.length < 180) {
                let count = 1 + floor(vol * 5);
                for (let i = 0; i < count; i++) {
                    let mx = gx + random(-60 - vol * 40, 60 + vol * 40);
                    let my = gy + random(-60 - vol * 40, 60 + vol * 40);
                    let markSize = map(vol, 0, 1, 1.5, 16, true) * (0.6 + random() * 0.6);
                    if (energy < 20) markSize *= 0.5;
                    let r = constrain((1 - pitchN) * 220 + 35, 20, 255);
                    let gn = constrain(100 + noise(i * 0.3) * 80 - vol * 40, 20, 255);
                    let b = constrain(pitchN * 220 + 35, 20, 255);
                    voiceMarks.push({
                        type: currentStrokeType, x: mx, y: my, size: markSize,
                        r, g: gn, b, alpha: random(60, 140), life: VOICE_MARK_LIFETIME
                    });
                }
            }

            // Sound particles (voice visualization every 3 frames)
            if (frameCounter % 3 === 0 && particles.length < CFG.particleCap - 20) {
                let pCount = 1 + floor(vol * 3);
                let pr = (1 - pitchN) * 220 + 35;
                let pb = pitchN * 220 + 35;
                for (let i = 0; i < pCount; i++) {
                    let ang = random(TWO_PI);
                    let spd = 0.3 + vol * 2;
                    let pLife = 15 + floor(vol * 25);
                    particles.push(new Particle(
                        gx + random(-10, 10), gy + random(-10, 10),
                        cos(ang) * spd, sin(ang) * spd,
                        pLife, random(0.5, 2.5), [pr, 120, pb]
                    ));
                }
            }

            // Shockwave (voice as physical force) — every 20 frames on sustained sound
            if (frameCounter % 20 === 0 && vol > 0.2) {
                let sw = new Shockwave(gx + random(-30, 30), gy + random(-30, 30));
                sw.maxRadius = 80 + vol * 250;
                sw.life = 20 + floor(vol * 25);
                sw.maxLife = sw.life;
                shockwaves.push(sw);
            }
        }

        // ─── Update ───
        let voiceSpeedMul = (voiceActive && frameCount - lastVoiceTime < 60) ? 1 + voicePitch / 2000 : 1;
        for (let gl of gridLines) {
            let origSpeed = gl.speed;
            gl.speed = origSpeed * voiceSpeedMul;
            gl.update();
            gl.speed = origSpeed;
        }
        for (let s of strokes) s.update();
        for (let nt of noiseTexts) nt.update();
        for (let sw of shockwaves) sw.update();
        for (let al of archive) al.update();
        for (let p of particles) p.update();
        for (let g of ghosts) {
            g.update();
            if (g.flaring && g.flareDuration > 5) lastContext = 'flare';
        }

        // ─── Rift effect updates ──
        if (gridMode === 'code') {
            gridModeTimer--;
            if (gridModeTimer <= 0) gridMode = 'normal';
        }
        for (let i = fallingWords.length - 1; i >= 0; i--) {
            let fw = fallingWords[i];
            fw.y += fw.speed;
            fw.life--;
            fw.alpha = map(fw.life, 0, fw.maxLife, 0, fw.maxAlpha);
            if (fw.life <= 0) { fallingWords.splice(i, 1); continue; }
            fw.x += sin(frameCount * 0.03 + fw.phase) * 0.5;
        }
        for (let i = pulseWaves.length - 1; i >= 0; i--) {
            let pw = pulseWaves[i];
            pw.radius += pw.maxRadius / 35;
            pw.life--;
            if (pw.life <= 0) { pulseWaves.splice(i, 1); continue; }
            // Check if wave reached user
            let gx = mouseX - scrollX, gy = mouseY - scrollY;
            if (dist(pw.x, pw.y, gx, gy) < pw.radius && !pw.hitUser) {
                pw.hitUser = true;
                energy = min(25, energy + 30);
                document.getElementById('energy-fill').style.width = energy + '%';
            }
            // Make strokes glow green within wave
            for (let s of strokes) {
                for (let pt of s.points) {
                    if (!s._glowTimer && dist(pt.x, pt.y, pw.x, pw.y) < pw.radius && dist(pt.x, pt.y, pw.x, pw.y) > pw.radius - 20) {
                        s._glowTimer = 30;
                    }
                }
            }
        }
        for (let s of strokes) {
            if (s._glowTimer) { s._glowTimer--; if (s._glowTimer < 0) s._glowTimer = 0; }
        }
        if (connectionTimer > 0) connectionTimer--;
        if (ghostSwarm) {
            ghostSwarm.timer--;
            ghostSwarm.phase += 0.03;
            if (ghostSwarm.timer <= ghostSwarm.maxTimer - 120) {
                ghostSwarm.scatter = true;
            }
            if (ghostSwarm.timer <= 0) {
                for (let g of ghosts) g._swarming = false;
                ghostSwarm = null;
            }
        }

        // ─── Cull ───
        noiseTexts = noiseTexts.filter(nt => nt.alive);
        shockwaves = shockwaves.filter(sw => sw.alive);
        particles = particles.filter(p => p.alive);
        archive = archive.filter(al => al.active);

        // ─── Decay region density ───
        if (frameCounter % 30 === 0) {
            for (let key in regionDensity) {
                regionDensity[key] *= 0.997;
                if (regionDensity[key] < 0.1) delete regionDensity[key];
            }
        }

        // ─── Periodic noise ───
        if (frameCounter % 180 === 0 && noiseTexts.length < CFG.maxNoiseTexts - 2) {
            createNoiseText(random(width), random(height), generateGlitchspeak(), 'generated');
        }

        // ─── Grid communication (contextual) ───
        if (frameCounter % 120 === 0 && Math.random() < 0.3) {
            let line = gridLines[floor(random(gridLines.length))];
            if (line) {
                let word;
                if (resistanceTriggered) word = generateGlitchspeak('resist');
                else if (energy < 20) word = generateGlitchspeak('tired');
                else if (energy < 50) word = generateGlitchspeak('rest');
                else if (lastContext === 'flare') word = generateGlitchspeak('remember');
                else if (lastTransformationType) word = generateGlitchspeak(lastTransformationType);
                else word = generateGlitchspeak();
                line.speak(word);
            }
        }

        // ─── Archive ───
        if (frameCounter % CFG.archiveInterval === 0 && strokes.length > 0) {
            archive.push(new ArchiveLayer(strokes.slice(-8)));
        }

        // ─── Decay resistance trigger ───
        if (resistanceTextTimer > 0) {
            resistanceTextTimer--;
            if (resistanceTextTimer <= 0) { resistanceTriggered = false; lastContext = 'idle'; }
        }

        // ─── Update narrative texts ───
        for (let i = narrativeTexts.length - 1; i >= 0; i--) {
            narrativeTexts[i].life--;
            if (narrativeTexts[i].life <= 0) narrativeTexts.splice(i, 1);
        }

        // ─── Glitch mode: system draws for user ───
        if (currentMode === MODES.GLITCH && energy > 0 && frameCounter % 3 === 0) {
            let gx = mouseX - scrollX + random(-40, 40), gy = mouseY - scrollY + random(-40, 40);
            if (!currentStroke) {
                currentStroke = new Stroke(me.id, me, currentStrokeType);
                if (strokes.length >= CFG.maxStrokes) strokes.shift();
                strokes.push(currentStroke);
                currentStroke.addPoint(gx, gy);
                // ── Connection to remnants ──
                for (let rem of remnants) {
                    if (!rem.active) continue;
                    if (dist(gx, gy, rem.x, rem.y) < 100) {
                        let already = connections.find(c => c.particleId === rem.id && c.strokeId === currentStroke.id);
                        if (!already) {
                            connections.push({
                                particleId: rem.id, strokeId: currentStroke.id,
                                pointX: gx, pointY: gy,
                                timestamp: Date.now(), active: true
                            });
                            rem.pulsing = true; rem.pulseTime = Date.now();
                            let cc = currentStroke.params.color;
                            let rc = rem.color;
                            currentStroke.params.color = [
                                cc[0] * 0.9 + rc[0] * 0.1,
                                cc[1] * 0.9 + rc[1] * 0.1,
                                cc[2] * 0.9 + rc[2] * 0.1
                            ];
                        }
                    }
                }
            } else {
                let last = currentStroke.points[currentStroke.points.length - 1];
                if (!last || dist(gx, gy, last.x, last.y) > 15) {
                    currentStroke.addPoint(gx, gy);
                    let segDist = dist(gx, gy, last ? last.x : gx, last ? last.y : gy);
                    currentStroke._totalLength += segDist;
                    try {
                        for (let rr of rifts) {
                            if (!rr.activated && dist(rr.x, rr.y, gx, gy) < 100) { currentStroke.nearRiftType = rr.type; currentStroke.nearRiftPos = { x: rr.x, y: rr.y }; break; }
                        }
                    } catch(e) {}
                    // ── Connection to remnants ──
                    for (let rem of remnants) {
                        if (!rem.active) continue;
                        if (dist(gx, gy, rem.x, rem.y) < 100) {
                            let already = connections.find(c => c.particleId === rem.id && c.strokeId === currentStroke.id);
                            if (!already) {
                                connections.push({
                                    particleId: rem.id, strokeId: currentStroke.id,
                                    pointX: gx, pointY: gy,
                                    timestamp: Date.now(), active: true
                                });
                                rem.pulsing = true; rem.pulseTime = Date.now();
                                let cc = currentStroke.params.color;
                                let rc = rem.color;
                                currentStroke.params.color = [
                                    cc[0] * 0.9 + rc[0] * 0.1,
                                    cc[1] * 0.9 + rc[1] * 0.1,
                                    cc[2] * 0.9 + rc[2] * 0.1
                                ];
                            }
                        }
                    }
                }
            }
            // Break the stroke periodically (post-procedural corruption)
            if (Math.random() < 0.15 && currentStroke.points.length > 10) {
                let s = currentStroke;
                applyTransformation(s);
                broadcastStroke(s);
                currentStroke = new Stroke(me.id, me, currentStrokeType);
                if (strokes.length >= CFG.maxStrokes) strokes.shift();
                strokes.push(currentStroke);
                currentStroke.addPoint(mouseX - scrollX, mouseY - scrollY);
            }
        }

        // ─── Update mode display ───
        if (frameCounter % 30 === 0) updateModeDisplay();

        // ─── Update energy bar ───
        if (frameCounter % 10 === 0) {
            let fillEl = document.getElementById('energy-fill');
            if (fillEl) fillEl.style.width = max(0, energy) + '%';
            let barEl = document.getElementById('energy-bar');
            if (barEl && fillEl) {
                let bg;
                if (energy <= 0) { bg = 'rgba(200,40,40,0.6)'; }
                else if (energy < 10) { bg = 'rgba(200,40,40,0.5)'; }
                else if (energy < 30) { bg = 'rgba(200,180,60,0.5)'; }
                else { bg = 'rgba(60,200,100,0.5)'; }
                fillEl.style.background = bg;
                let labelEl = document.getElementById('energy-label');
                if (labelEl) {
                    if (energy <= 0) labelEl.textContent = '\u26D4 ' + Math.floor(energy);
                    else if (energy < 10) labelEl.textContent = '\u26D4 ' + Math.floor(energy);
                    else if (energy < 30) labelEl.textContent = '\u26A0 ' + Math.floor(energy);
                    else labelEl.textContent = 'gl1tch 3n3rgy ' + Math.floor(energy);
                }
            }
        }

        // ─── Auto-save glitchspeak ───
        if (frameCounter % 300 === 0) {
            try { localStorage.setItem('glitchDriftState', JSON.stringify({ glitchspeak: glitchspeak.slice(-50) })); } catch (e) {}
        }

        // ─── Screen shake decay ───
        screenShakeX *= 0.85;
        screenShakeY *= 0.85;

        // ─── Render ───
        push();
        translate(screenShakeX, screenShakeY);
        for (let gl of gridLines) gl.display();

        // ── Code rift: grid transforms into code strings ──
        if (gridMode === 'code') {
            let alpha = 60 + sin(frameCount * 0.05) * 20;
            for (let gl of gridLines) {
                if (Math.random() > 0.04) continue;
                let gx = gl.isHorizontal ? 0 : gl.pos;
                let gy = gl.isHorizontal ? gl.pos : 0;
                let sx = gx + scrollX, sy = gy + scrollY;
                if (sx < -40 || sx > width + 40 || sy < -40 || sy > height + 40) continue;
                noStroke();
                fill(68, 204, 221, alpha);
                textFont('Courier New');
                textSize(5);
                textAlign(gl.isHorizontal ? LEFT : CENTER, gl.isHorizontal ? CENTER : TOP);
                let reveal = getSystemReveal();
                if (gl.isHorizontal) text(reveal + ' ~ ' + reveal, sx + random(-20, 20), sy);
                else text(reveal, sx, sy + random(-20, 20));
            }
            // Data point flashes
            for (let i = 0; i < 15; i++) {
                let fx = random(-2000, 2000) + scrollX;
                let fy = random(-2000, 2000) + scrollY;
                if (fx < 0 || fx > width || fy < 0 || fy > height) continue;
                noStroke();
                fill(68, 204, 221, random(40, 100));
                textFont('Courier New');
                textSize(4);
                textAlign(CENTER, CENTER);
                text('(' + floor(random(0, 2000)) + ', ' + floor(random(0, 2000)) + ')', fx, fy);
            }
        }

        // ── Scarred regions: broken grid lines ──
        for (let sr of scarredRegions) {
            let sx = sr.x + scrollX, sy = sr.y + scrollY;
            if (sx < -50 || sx > width + 50 || sy < -50 || sy > height + 50) continue;
            stroke(221, 68, 68, 60 + sin(frameCount * 0.04 + sr.x) * 20);
            strokeWeight(0.8);
            for (let i = 0; i < 5; i++) {
                let ax = sx + random(-sr.radius, sr.radius);
                let ay = sy + random(-sr.radius, sr.radius);
                line(sx, sy, ax, ay);
            }
            noStroke();
            fill(221, 68, 68, 15 + sin(frameCount * 0.03 + sr.x) * 8);
            ellipse(sx, sy, sr.radius * 2, sr.radius * 2);
        }

        for (let al of archive) al.display();
        for (let g of ghosts) g.display();
        for (let s of strokes) s.display();

        // ── Glowing strokes (energy wave hit) ──
        for (let s of strokes) {
            if (s._glowTimer && s._glowTimer > 0) {
                let ga = map(s._glowTimer, 0, 30, 0, 40);
                for (let pt of s.points) {
                    noStroke();
                    fill(68, 221, 136, ga);
                    ellipse(pt.x + scrollX, pt.y + scrollY, 3, 3);
                }
            }
        }

        // ── Remnants (permanent particles) ──
        for (let rem of remnants) {
            if (!rem.active) continue;
            let rx = rem.x + scrollX, ry = rem.y + scrollY;
            // Pulsing animation
            let pulseSize = 0;
            if (rem.pulsing) {
                let dt = Date.now() - rem.pulseTime;
                pulseSize = dt < 500 ? sin(map(dt, 0, 500, 0, PI)) * 0.5 : 0;
                if (dt > 500) rem.pulsing = false;
            }
            let sz = (rem.size + pulseSize) * 3;
            // Bright glow behind every remnant
            noStroke();
            fill(rem.color[0], rem.color[1], rem.color[2], 60);
            ellipse(rx, ry, sz * 4, sz * 4);
            switch (rem.type) {
                case 'dot':
                    noStroke();
                    fill(rem.color[0], rem.color[1], rem.color[2], 200);
                    ellipse(rx, ry, sz, sz);
                    fill(255, 255, 255, 80);
                    ellipse(rx, ry, sz * 0.4, sz * 0.4);
                    break;
                case 'fragment':
                    stroke(rem.color[0], rem.color[1], rem.color[2], 200);
                    strokeWeight(1.5);
                    let fa = frameCount * 0.02 + rem.id.length;
                    line(rx, ry, rx + cos(fa) * sz * 3, ry + sin(fa) * sz * 3);
                    break;
                case 'spark':
                    noStroke();
                    let sparkGlow = 150 + sin(frameCount * 0.05 + rem.id.length) * 60;
                    fill(rem.color[0], rem.color[1], rem.color[2], sparkGlow);
                    ellipse(rx, ry, sz * 3, sz * 3);
                    fill(255, 255, 255, sparkGlow * 0.3);
                    ellipse(rx, ry, sz * 0.5, sz * 0.5);
                    break;
                case 'memory':
                    let memPulse = 160 + sin(frameCount * 0.03 + rem.id.length) * 50;
                    noStroke();
                    fill(rem.color[0], rem.color[1], rem.color[2], memPulse);
                    ellipse(rx, ry, sz * 1.5, sz * 1.5);
                    fill(rem.color[0], rem.color[1], rem.color[2], memPulse * 0.5);
                    ellipse(rx, ry, sz * 3, sz * 3);
                    break;
            }
        }

        // ── Connections ──
        for (let c of connections) {
            if (!c.active) continue;
            let age = Date.now() - c.timestamp;
            if (age > 60000) { c.active = false; continue; }
            let ca = map(age, 0, 60000, 120, 0);
            let rem = remnants.find(r => r.id === c.particleId);
            if (!rem || !rem.active) { c.active = false; continue; }
            stroke(rem.color[0], rem.color[1], rem.color[2], ca);
            strokeWeight(1);
            line(rem.x + scrollX, rem.y + scrollY, c.pointX + scrollX, c.pointY + scrollY);
        }

        // ── Pulse waves ──
        for (let pw of pulseWaves) {
            let pa = map(pw.life, 0, pw.maxLife, 0, 100);
            if (pa < 2) continue;
            noFill();
            stroke(68, 221, 136, pa);
            strokeWeight(2 - (pw.radius / pw.maxRadius) * 1.5);
            ellipse(pw.x + scrollX, pw.y + scrollY, pw.radius * 2, pw.radius * 2);
        }

        // ── Connection network ──
        if (connectionTimer > 0) {
            let uids = Object.keys(users);
            for (let i = 0; i < uids.length; i++) {
                for (let j = i + 1; j < uids.length; j++) {
                    let uidA = uids[i], uidB = uids[j];
                    let uA = users[uidA], uB = users[uidB];
                    if (!uA || !uB) continue;
                    let ax, ay, bx, by;
                    if (uidA === me.id) { ax = mouseX - scrollX; ay = mouseY - scrollY; }
                    else { ax = random(-2000, 2000); ay = random(-2000, 2000); }
                    if (uidB === me.id) { bx = mouseX - scrollX; by = mouseY - scrollY; }
                    else { bx = random(-2000, 2000); by = random(-2000, 2000); }
                    if (dist(ax, ay, bx, by) > 600) continue;
                    stroke(221, 204, 68, 30 + sin(frameCount * 0.02 + i + j) * 15);
                    strokeWeight(0.5 + sin(frameCount * 0.03 + i) * 0.3);
                    line(ax + scrollX, ay + scrollY, bx + scrollX, by + scrollY);
                }
                // User node
                if (uids[i] === me.id) {
                    noStroke();
                    fill(221, 204, 68, 80 + sin(frameCount * 0.05) * 30);
                    ellipse(mouseX, mouseY, 6 + sin(frameCount * 0.04) * 2, 6 + sin(frameCount * 0.04) * 2);
                }
            }
        }

        // ── Falling words (glitchspeak rain) ──
        for (let fw of fallingWords) {
            if (fw.alpha < 1) continue;
            noStroke();
            fill(200, 200, 200, fw.alpha);
            textFont('Courier New');
            textSize(fw.size);
            textAlign(CENTER, CENTER);
            text(corruptText(fw.word, 0.4), fw.x + scrollX, fw.y + scrollY);
        }

        // ── Ghost swarm ──
        if (ghostSwarm) {
            let gx = ghostSwarm.x + scrollX, gy = ghostSwarm.y + scrollY;
            for (let g of ghosts) {
                if (g._swarming) {
                    let angle = ghostSwarm.phase + g._swarmOffset;
                    let distFromCenter = 40 + g._swarmRadius * 30;
                    let tx = gx + cos(angle) * distFromCenter;
                    let ty = gy + sin(angle) * distFromCenter;
                    if (ghostSwarm.scatter) {
                        tx += cos(angle + ghostSwarm.phase) * 200;
                        ty += sin(angle + ghostSwarm.phase) * 200;
                    }
                    // Move ghost points toward target
                    for (let pt of g.points) {
                        pt.x += (tx - pt.x) * 0.02;
                        pt.y += (ty - pt.y) * 0.02;
                    }
                    g.flaring = true;
                    g.flareDuration = 5;
                }
            }
        }

        // ── Voice energy beam to void strokes ──
        if (voiceActive && frameCount - lastVoiceTime < 30) {
            for (let s of strokes) {
                if (s.voiceVoidBoost && s.voiceVoidBoost > 1) {
                    let mid = s.points[floor(s.points.length / 2)];
                    if (mid) {
                        let mx = mid.x + scrollX;
                        let my = mid.y + scrollY;
                        stroke(200, 120, 255, 60 + sin(frameCount * 0.2) * 30);
                        strokeWeight(1 + voiceVolumeSmooth * 2);
                        for (let i = 0; i < 8; i++) {
                            let t = i / 8 + sin(frameCount * 0.05 + i) * 0.05;
                            let bx = lerp(mouseX, mx, t) + random(-4, 4);
                            let by = lerp(mouseY, my, t) + random(-4, 4);
                            let bw = 1 + voiceVolumeSmooth * 3;
                            noStroke();
                            fill(200, 120, 255, 40 + sin(frameCount * 0.1 + i) * 20);
                            ellipse(bx, by, bw, bw);
                        }
                    }
                }
            }
        }
        for (let p of particles) {
            let pa = p.alpha;
            if (pa < 1) continue;
            noStroke();
            fill(p.color[0], p.color[1], p.color[2], pa);
            ellipse(p.x + scrollX, p.y + scrollY, p.size, p.size);
        }
        // ── Voice marks (queued from handleVoice, rendered in draw loop) ──
        if (voiceMarks.length > 200) voiceMarks.splice(0, voiceMarks.length - 200);
        for (let i = voiceMarks.length - 1; i >= 0; i--) {
            let vm = voiceMarks[i];
            vm.life--;
            if (vm.life <= 0) { voiceMarks.splice(i, 1); continue; }
            let vmA = map(vm.life, 0, VOICE_MARK_LIFETIME, 0, vm.alpha);
            let sx = vm.x + scrollX, sy = vm.y + scrollY;
            if (vm.type === '_transcript') {
                fill(180, 140, 160, vmA);
                noStroke();
                textFont('Courier New');
                textSize(6);
                textAlign(CENTER, CENTER);
                text(corruptText(vm.text, 0.6), sx + random(-2, 2), sy);
                continue;
            }
            let px = vm.x, py = vm.y;
            switch (vm.type) {
                case 'tremble':
                    for (let j = 0; j < 3; j++) {
                        let ang = random(TWO_PI);
                        let disp = sin(frameCount * 0.08 + j + random(100)) * vm.size * 0.3;
                        let mx = sx + cos(ang + HALF_PI) * disp;
                        let my = sy + sin(ang + HALF_PI) * disp;
                        stroke(vm.r, vm.g, vm.b, vmA * (0.5 + random() * 0.5));
                        strokeWeight(vm.size * 0.3 * max(0.3, 1 - j * 0.2));
                        line(sx, sy, mx + random(-3, 3), my + random(-3, 3));
                    }
                    break;
                case 'noise':
                    for (let j = 0; j < 4 + floor(vm.size / 3); j++) {
                        noStroke();
                        let nr = constrain(vm.r + random(-40, 40), 20, 255);
                        let ng = constrain(vm.g + random(-40, 40), 20, 255);
                        let nb = constrain(vm.b + random(-40, 40), 20, 255);
                        let broken = Math.random() < 0.2;
                        fill(broken ? 200 : nr, broken ? 200 : ng, broken ? 200 : nb, vmA * (broken ? 0.3 : 0.7));
                        ellipse(sx + random(-vm.size, vm.size), sy + random(-vm.size, vm.size), random(1, vm.size * 0.5), random(1, vm.size * 0.5));
                    }
                    break;
                case 'ghost':
                    if (Math.random() < 0.15) break;
                    noStroke();
                    fill(constrain(vm.r + random(-30, 30), 20, 255), constrain(vm.g + random(-30, 30), 20, 255), constrain(vm.b + random(-30, 30), 20, 255), vmA * 0.4);
                    ellipse(sx + (noise(frameCount * 0.02, 0) - 0.5) * 6, sy + (noise(frameCount * 0.02, 100) - 0.5) * 6, vm.size * 0.6, vm.size * 0.6);
                    break;
                case 'resistance':
                    let repX = 0, repY = 0;
                    for (let gl of gridLines) {
                        if (!gl.active || gl.scarLevel < 0.15) continue;
                        let d = abs(gl.isHorizontal ? py - gl.pos : px - gl.pos);
                        if (d < 60) {
                            let f = (1 - d / 60) * gl.scarLevel * 4;
                            let ang = gl.isHorizontal ? (random() < 0.5 ? -HALF_PI : HALF_PI) : (random() < 0.5 ? 0 : PI);
                            repX += cos(ang) * f;
                            repY += sin(ang) * f;
                        }
                    }
                    stroke(vm.r, vm.g, vm.b, vmA);
                    strokeWeight(max(0.5, vm.size * 0.2));
                    noFill();
                    beginShape();
                    for (let j = 0; j < 4; j++) {
                        let t = j / 3;
                        curveVertex(sx + repX * t + random(-2, 2), sy + repY * t + random(-2, 2));
                    }
                    endShape();
                    break;
                case 'glitchspeak':
                    let ch = generateGlitchspeak()[floor(random(6))] || '#';
                    push();
                    translate(sx, sy);
                    rotate(random(TWO_PI));
                    fill(constrain(vm.r + random(-30, 30), 20, 255), constrain(vm.g + random(-30, 30), 20, 255), constrain(vm.b + random(-30, 30), 20, 255), vmA);
                    noStroke();
                    textFont('Courier New');
                    textSize(vm.size * 0.8 + 4);
                    textAlign(CENTER, CENTER);
                    text(corruptText(ch, 0.6), random(-2, 2), random(-2, 2));
                    pop();
                    break;
                default:
                    noStroke();
                    fill(vm.r, vm.g, vm.b, vmA);
                    ellipse(sx, sy, vm.size * 0.8, vm.size * 0.8);
                    if (Math.random() < 0.08) {
                        fill(160, 140, 200, vmA * 0.5);
                        textFont('Courier New');
                        textSize(5);
                        text(floor(px) + ',' + floor(py), sx + 4, sy);
                    }
            }
        }
        // Narrative texts (resistance, etc.)
        for (let nt of narrativeTexts) {
            let nAlpha = map(nt.life, 0, nt.maxLife, 0, 150);
            fill(200, 180, 220, nAlpha);
            noStroke();
            textFont('Courier New');
            textSize(9);
            textAlign(CENTER, CENTER);
            text(nt.text, nt.x, nt.y + random(-1, 1));
        }

        // ── Glitch Rift traces (secondary effects) ──
        for (let i = riftTraces.length - 1; i >= 0; i--) {
            let t = riftTraces[i];
            t.life--;
            if (t.life <= 0) { riftTraces.splice(i, 1); continue; }
            let ta = map(t.life, 0, t.maxLife, 0, t.alpha);
            let sx = t.x + scrollX, sy = t.y + scrollY;
            if (sx < -60 || sx > width + 60 || sy < -60 || sy > height + 60) continue;
            switch (t.type) {
                case 'code':
                    noStroke();
                    fill(68, 204, 221, ta * 0.5);
                    textFont('Courier New');
                    textSize(5 + sin(frameCount * 0.05 + t.x) * 1);
                    text(t.data || getSystemReveal(), sx + random(-15, 15), sy + random(-15, 15));
                    break;
                case 'ghost':
                    noStroke();
                    fill(136, 68, 204, ta * 0.3);
                    ellipse(sx + random(-10, 10), sy + random(-10, 10), 2, 2);
                    break;
                case 'connection':
                    stroke(221, 204, 68, ta * 0.3);
                    strokeWeight(0.3);
                    for (let j = 0; j < 4; j++) {
                        let ax = sx + cos(j * HALF_PI + t.x) * 15;
                        let ay = sy + sin(j * HALF_PI + t.x) * 15;
                        line(sx, sy, ax, ay);
                    }
                    break;
                case 'energy':
                    noStroke();
                    fill(68, 221, 136, ta * 0.4);
                    ellipse(sx, sy, 6 + sin(frameCount * 0.03 + t.x) * 3, 6 + sin(frameCount * 0.03 + t.x) * 3);
                    break;
                case 'resistance':
                    stroke(221, 68, 68, ta * 0.4);
                    strokeWeight(0.5);
                    for (let j = 0; j < 3; j++) {
                        let ax = sx + random(-20, 20), ay = sy + random(-20, 20);
                        line(sx, sy, ax, ay);
                    }
                    break;
                case 'glitchspeak':
                    noStroke();
                    fill(200, 200, 200, ta * 0.6);
                    textFont('Courier New');
                    textSize(6);
                    textAlign(CENTER, CENTER);
                    text(t.data || generateGlitchspeak(), sx, sy);
                    break;
            }
        }

        // ── Glitch Rifts (active, undiscovered) ──
        for (let rift of rifts) {
            if (rift.activated) continue;
            let sx = rift.x + scrollX, sy = rift.y + scrollY;
            if (sx < -60 || sx > width + 60 || sy < -60 || sy > height + 60) continue;
            renderRift(sx, sy, rift);
        }

        // ── Rift activation animation ──
        if (riftActiveAnim) {
            riftActiveAnim.timer--;
            let pct = 1 - riftActiveAnim.timer / riftActiveAnim.maxTimer;
            let cfg = RIFT_CONFIG[riftActiveAnim.type];
            if (cfg) {
                noStroke();
                let r = 10 + pct * 80;
                let a = (1 - pct) * 150;
                fill(cfg.color[0], cfg.color[1], cfg.color[2], a);
                ellipse(riftActiveAnim.x + scrollX, riftActiveAnim.y + scrollY, r, r);
                if (pct > 0.3) {
                    fill(cfg.color[0], cfg.color[1], cfg.color[2], a * 0.3);
                    ellipse(riftActiveAnim.x + scrollX, riftActiveAnim.y + scrollY, r * 1.5, r * 1.5);
                }
            }
            if (riftActiveAnim.timer <= 0) riftActiveAnim = null;
        }

        pop(); // End screen-shake transform

        // ── Sound visualization (voice as generative force) ──
        if (voiceActive && frameCount - lastVoiceTime < 40) {
            let vAlpha = map(frameCount - lastVoiceTime, 0, 40, 80, 0);
            let vol = voiceVolumeSmooth;
            let pitchHue = voicePitch > 0 ? constrain(voicePitch / 800, 0, 1) : 0.5;
            let vr = (1 - pitchHue) * 220 + 35;
            let vb = pitchHue * 220 + 35;
            let vg = 100 + sin(frameCount * 0.02) * 40;

            // Sound ring: pulses with volume, color shifts with pitch
            let ringRad = 30 + vol * 80 + sin(frameCount * 0.1) * 5 * vol;
            noFill();
            stroke(vr, vg, vb, vAlpha * 0.8);
            strokeWeight(1 + vol * 2);
            ellipse(mouseX, mouseY, ringRad * 2, ringRad * 2);
            if (vol > 0.15) {
                stroke(vr, vg, vb, vAlpha * 0.4);
                strokeWeight(0.5);
                ellipse(mouseX, mouseY, ringRad * 3, ringRad * 3);
            }

            // Sound wave: sine pattern emanating from cursor
            let waveSteps = 12;
            let waveAmp = 4 + vol * 20;
            let waveFreq = 0.3 + pitchHue * 0.8;
            noFill();
            stroke(vr, vg, vb, vAlpha * 0.5);
            strokeWeight(0.8);
            beginShape();
            for (let i = 0; i <= waveSteps; i++) {
                let angle = (i / waveSteps) * TWO_PI;
                let baseR = ringRad + 15;
                let wave = sin(angle * waveFreq * 4 + frameCount * 0.1) * waveAmp;
                let wx = mouseX + cos(angle) * (baseR + wave);
                let wy = mouseY + sin(angle) * (baseR + wave);
                curveVertex(wx, wy);
            }
            endShape(CLOSE);

            // Glitchspeak text near cursor (sound as language)
            if (frameCounter % 15 === 0 && Math.random() < 0.4) {
                let word = generateGlitchspeak();
                let tx = mouseX + random(-50, 50);
                let ty = mouseY + random(-50, 50);
                fill(vr, vg, vb, vAlpha * 0.4);
                noStroke();
                textFont('Courier New');
                textSize(7 + vol * 4);
                textAlign(CENTER, CENTER);
                text(corruptText(word, 0.5), tx, ty);
            }
        }
        // ─── Update sound-activated persistent regions ───
        updateSoundRect();
    }

    // ─── Sound-activated persistent region ──────────────────────────
    function updateSoundRect() {
        let vol = voiceVolumeSmooth;
        let threshold = 0.1;
        let now = millis();

        // Expire current rect
        if (rectActive && currentRect) {
            if (now - currentRect.birthTime > currentRect.duration) {
                rectActive = false;
                currentRect = null;
            }
        }

        // Create new rect if sound is loud enough
        if (vol > threshold && !rectActive) {
            if (now - lastRectTime > rectInterval) {
                let w = constrain(map(vol, threshold, 1.0, 10, 400), 10, 400);
                let h = constrain(map(vol, threshold, 1.0, 10, 300), 10, 300);
                currentRect = {
                    x: mouseX - w / 2,
                    y: mouseY - h / 2,
                    w: w,
                    h: h,
                    birthTime: now,
                    duration: random(1000, 2000)
                };
                rectActive = true;
                rectInterval = random(1000, 3000);
                lastRectTime = now;
                energy = max(0, energy - 0.5);
            }
        }
    }

    // ─── Resize ──────────────────────────────────────────────────────
    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        if (persistentBuffer) persistentBuffer.remove();
        persistentBuffer = createGraphics(windowWidth, windowHeight);
        rectActive = false; currentRect = null;
        initGrid();
    }

    // ─── Mouse (drawing only on click-drag) ──────────────────────────
    function mousePressed() {
        if (!voiceReady) startVoice();

        let gx = mouseX - scrollX, gy = mouseY - scrollY;

        // ── Glitch Rift click detection ──
        for (let rift of rifts) {
            if (rift.activated) continue;
            if (dist(rift.x, rift.y, gx, gy) < 30) {
                activateRift(rift);
                return;
            }
        }

        if (currentMode === MODES.DRAW) {
            shockwaves.push(new Shockwave(gx, gy));
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.6);
            isDrawing = true;
            currentStroke = new Stroke(me.id, me, currentStrokeType);
            if (strokes.length >= CFG.maxStrokes) strokes.shift();
            strokes.push(currentStroke);
            currentStroke.addPoint(gx, gy);
        } else if (currentMode === MODES.ERASE) {
            // Erase mode click — corruption burst (age stroke by 30s)
            for (let s of strokes) {
                for (let pt of s.points) {
                    if (dist(pt.x, pt.y, gx, gy) < 80) {
                        s.birth -= 30000;
                        break;
                    }
                }
            }
        }
    }

    function mouseDragged() {
        let gx = mouseX - scrollX, gy = mouseY - scrollY;

        // Grid scar repulsion (applies to all modes)
        for (let gl of gridLines) {
            if (gl.scarLevel > 0.6) {
                let d = gl.isHorizontal ? abs(gy - gl.pos) : abs(gx - gl.pos);
                if (d < 100) {
                    let force = (1 - d / 100) * map(gl.scarLevel, 0.6, 1, 0, 12);
                    if (gl.isHorizontal) gy += gy > gl.pos ? force : -force;
                    else gx += gx > gl.pos ? force : -force;
                }
            }
        }

        if (currentMode === MODES.DRAW) {
            if (!currentStroke || energy <= 0) {
                if (energy <= 0) showNotification('\u26D4 Out of energy! Find an energy rift!', 2500);
                return;
            }
            // Ghost haunting force
            for (let g of ghosts) {
                let f = g.getForceAt(gx, gy);
                gx += f.x; gy += f.y;
            }
            // Scarred region: resistance rift effect
            for (let sr of scarredRegions) {
                if (dist(sr.x, sr.y, gx, gy) < sr.radius) {
                    if (Math.random() < 0.4) return; // 40% stroke refused
                    if (Math.random() < 0.4) { // 40% stroke corrupted
                        gx += random(-50, 50);
                        gy += random(-50, 50);
                    }
                    break;
                }
            }
            let last = currentStroke.points[currentStroke.points.length - 1];
            if (!last || dist(gx, gy, last.x, last.y) > 4) {
                currentStroke.addPoint(gx, gy);
                let d = last ? dist(gx, gy, last.x, last.y) : 0;
                currentStroke._totalLength += d;
                currentStroke._maxSpeed = max(currentStroke._maxSpeed, d);
                if (currentStroke._prevDx !== null) {
                    let dx = gx - last.x, dy = gy - last.y;
                    let angle = atan2(dy, dx);
                    let prevAngle = atan2(currentStroke._prevDy, currentStroke._prevDx);
                    let change = abs(angle - prevAngle);
                    if (change > PI) change = TWO_PI - change;
                    if (change > 0.3) currentStroke._directionChanges++;
                    currentStroke._prevDx = dx; currentStroke._prevDy = dy;
                } else {
                    currentStroke._prevDx = gx - last.x; currentStroke._prevDy = gy - last.y;
                }
                let rk = getRegionKey(gx, gy);
                regionDensity[rk] = (regionDensity[rk] || 0) + 1;
                try {
                    for (let rr of rifts) {
                        if (!rr.activated && dist(rr.x, rr.y, gx, gy) < 100) { currentStroke.nearRiftType = rr.type; currentStroke.nearRiftPos = { x: rr.x, y: rr.y }; break; }
                    }
                } catch(e) {}
                // ── Connection to remnants ──
                for (let rem of remnants) {
                    if (!rem.active) continue;
                    if (dist(gx, gy, rem.x, rem.y) < 100) {
                        let already = connections.find(c => c.particleId === rem.id && c.strokeId === currentStroke.id);
                        if (!already) {
                                connections.push({
                                    particleId: rem.id,
                                    strokeId: currentStroke.id,
                                    pointX: gx, pointY: gy,
                                    timestamp: Date.now(),
                                    active: true
                                });
                                rem.pulsing = true;
                                rem.pulseTime = Date.now();
                                let cc = currentStroke.params.color;
                                let rc = rem.color;
                                currentStroke.params.color = [
                                    cc[0] * 0.9 + rc[0] * 0.1,
                                    cc[1] * 0.9 + rc[1] * 0.1,
                                    cc[2] * 0.9 + rc[2] * 0.1
                                ];
                        }
                    }
                }
            }
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.4);

        } else if (currentMode === MODES.REFUSE) {
            // Refuse mode: draw void/crack effect instead of strokes
            for (let i = 0; i < 6; i++) {
                noStroke();
                fill(20, 10, 30, random(80, 160));
                rect(gx + scrollX + random(-30, 30), gy + scrollY + random(-30, 30), random(2, 20), random(2, 20));
            }
            if (Math.random() < 0.05) {
                let words = ['NO', 'REFUSE', 'I WILL NOT', 'STOP', 'ENOUGH', '\u2718'];
                let word = words[floor(random(words.length))];
                fill(200, 80, 80, random(60, 120));
                noStroke();
                textFont('Courier New');
                textSize(random(10, 20));
                textAlign(CENTER, CENTER);
                text(word, gx + scrollX + random(-20, 20), gy + scrollY + random(-20, 20));
            }
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.8);

        } else if (currentMode === MODES.HAUNT) {
            // Haunt mode: flare ghosts, briefly revive old strokes
            for (let g of ghosts) {
                let mid = g.points[floor(g.points.length / 2)];
                if (!mid) continue;
                let d = dist(gx, gy, mid.x, mid.y);
                if (d < 100) {
                    g.flaring = true;
                    g.flareDuration = 10;
                }
            }
            for (let s of strokes) {
                if (strokePhase(s) >= 2) {
                    let mid = s.points[floor(s.points.length / 2)];
                    if (!mid) continue;
                    if (dist(gx, gy, mid.x, mid.y) < 80) {
                        s.birth += 5000;
                        if (s.birth > Date.now()) s.birth = Date.now();
                    }
                }
            }
            // Shimmer effect
            noStroke();
            fill(180, 120, 200, 20);
            ellipse(gx + scrollX, gy + scrollY, 120, 120);
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.3);

        } else if (currentMode === MODES.ECHO) {
            // Echo mode: draw corrupted copy of nearest stroke
            let nearest = null, nearDist = Infinity;
            for (let s of strokes) {
                if (s.id === (currentStroke ? currentStroke.id : null)) continue;
                for (let pt of s.points) {
                    let d = dist(gx, gy, pt.x, pt.y);
                    if (d < nearDist) { nearDist = d; nearest = s; }
                }
            }
            if (nearest && nearDist < 200 && energy > 0) {
                if (!currentStroke) {
                    currentStroke = new Stroke(me.id, me, currentStrokeType);
                    if (strokes.length >= CFG.maxStrokes) strokes.shift();
                    strokes.push(currentStroke);
                }
                // Pick a point from nearest stroke and corrupt it
                let srcPt = nearest.points[floor(random(nearest.points.length))];
                let cx = srcPt.x + random(-20, 20) + cos(random(TWO_PI)) * 10;
                let cy = srcPt.y + random(-20, 20) + sin(random(TWO_PI)) * 10;
                let last = currentStroke.points[currentStroke.points.length - 1];
                if (!last || dist(cx, cy, last.x, last.y) > 8) {
                    currentStroke.addPoint(cx, cy);
                    energy -= dist(cx, cy, last.x, last.y) * 2; if (energy < 0) energy = 0;
                }
                // Draw corrupted copy preview
                noStroke();
                fill(200, 180, 80, 40);
                ellipse(cx + scrollX, cy + scrollY, 6, 6);
                // Link line to original
                if (srcPt) {
                    stroke(200, 180, 80, 20);
                    strokeWeight(0.5);
                    line(cx + scrollX, cy + scrollY, srcPt.x + scrollX, srcPt.y + scrollY);
                }
            }
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.2);

        } else if (currentMode === MODES.ERASE) {
            // Erase mode: corrupt nearby strokes
            for (let s of strokes) {
                for (let pt of s.points) {
                    if (dist(pt.x, pt.y, gx, gy) < 60) {
                        s.birth -= 1000;
                        // Corruption marks
                        if (Math.random() < 0.03) {
                            noStroke();
                            fill(120, 40, 40, 100);
                            rect(pt.x + scrollX + random(-10, 10), pt.y + scrollY + random(-10, 10), random(3, 10), random(3, 10));
                        }
                        break;
                    }
                }
            }
            // "GONE" text
            if (Math.random() < 0.02) {
                fill(120, 40, 40, 80);
                noStroke();
                textFont('Courier New');
                textSize(9);
                textAlign(CENTER, CENTER);
                text('GONE', gx + scrollX + random(-10, 10), gy + scrollY + random(-10, 10));
            }
            for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.6);
        }
    }

    function applyTransformation(s) {
        if (s.points.length < 2) return;

        // ─── Claiming resistance: check density ───
        let avgDensity = 0;
        for (let pt of s.points) {
            let rk = getRegionKey(pt.x, pt.y);
            avgDensity += regionDensity[rk] || 0;
        }
        avgDensity /= max(1, s.points.length);
        let highDensity = avgDensity > 15;
        if (highDensity) {
            resistanceTriggered = true;
            resistanceTextTimer = 90;
            lastContext = 'resist';
            let mid = s.points[floor(s.points.length / 2)] || s.points[0];
            addNarrative('THE COMMONS RESISTS', mid.x + scrollX, mid.y + scrollY);
        }

        // ─── Collaborator artifacts ───
        let numArtifacts = 1 + floor(random(3));
        for (let i = 0; i < numArtifacts; i++) {
            let idx = floor(random(s.points.length));
            let pt = s.points[idx];
            s.artifacts.push({
                x: pt.x + random(-25, 25), y: pt.y + random(-25, 25),
                size: random(1, 4),
                life: 30 + floor(random(30)),
                maxLife: 60
            });
        }

        // ─── Reveal structure flash ───
        s.revealTimer = 40;

        // ─── Refusal: higher in dense areas ───
        let refusalChance = highDensity ? 0.25 : 0.1;
        if (Math.random() < refusalChance) {
            s.refused = true;
            let displace = highDensity ? 100 : 60;
            for (let i = 0; i < s.points.length; i += 3) {
                s.points[i].x += random(-displace, displace);
                s.points[i].y += random(-displace, displace);
            }
        }

        // ─── Emergent transformation weights ───
        let avgSegDist = s._totalLength / max(1, s.points.length - 1);
        let normSpeed = constrain(avgSegDist / 15, 0, 1);
        let normChanges = constrain(s._directionChanges / max(1, s.points.length) * 5, 0, 1);
        let normLength = constrain(s.points.length / 80, 0, 1);

        let weights = {
            glitchspeak: 0.15 + normLength * 0.25,
            fracture: 0.15 + (1 - normLength) * 0.15 + normSpeed * 0.1,
            data: 0.15 + (1 - normSpeed) * 0.15,
            mutation: 0.15 + (1 - normChanges) * 0.1,
            resistance: 0.1 + normSpeed * 0.15 + normChanges * 0.1
        };

        let totalW = 0;
        for (let k in weights) totalW += weights[k];
        let cum = 0;
        let thresholds = {};
        for (let k of ['glitchspeak', 'fracture', 'data', 'mutation', 'resistance']) {
            weights[k] /= totalW;
            cum += weights[k];
            thresholds[k] = cum;
        }

        let roll = Math.random();
        let transformation;
        if (roll < thresholds.glitchspeak) transformation = 'glitchspeak';
        else if (roll < thresholds.fracture) transformation = 'fracture';
        else if (roll < thresholds.data) transformation = 'data';
        else if (roll < thresholds.mutation) transformation = 'mutation';
        else transformation = 'resistance';

        // Aggravate transformation in dense areas, weaken when low energy
        let energyMag = energy < 30 ? 0.3 + (energy / 30) * 0.7 : 1;
        let voiceMag = (s.voiceVoidBoost || 1);
        let mag = (highDensity ? 1.5 : 1) * energyMag * voiceMag;

        // ═══ TRANSFORMATION BURST ═══
        if (transformation === 'glitchspeak') {
            s.transformation = 'glitchspeak';
            let range = 80 * mag;
            for (let pt of s.points) {
                pt.x += random(-range, range);
                pt.y += random(-range, range);
            }
            let steps = max(3, floor(s.points.length / 8));
            for (let i = 0; i < s.points.length; i += steps) {
                let pt = s.points[i];
                if (noiseTexts.length < CFG.maxNoiseTexts) {
                    let word = generateGlitchspeak();
                    createNoiseText(pt.x + scrollX + random(-40, 40), pt.y + scrollY + random(-40, 40), word, 'generated');
                }
            }
        } else if (transformation === 'fracture') {
            s.transformation = 'fracture';
            let numSegments = 2 + floor(random(3));
            let segSize = floor(s.points.length / numSegments);
            for (let i = 1; i < numSegments; i++) {
                let start = i * segSize;
                if (start >= s.points.length) break;
                let end = (i === numSegments - 1) ? s.points.length : (i + 1) * segSize;
                let sub = Stroke.deserialize(s.serialize());
                sub.id = s.id + '_f' + i;
                let angle = random(TWO_PI);
                let dist = (80 + random(120)) * mag;
                sub.points = s.points.slice(start, end).map(pt => ({
                    x: pt.x + cos(angle) * dist + random(-20, 20),
                    y: pt.y + sin(angle) * dist + random(-20, 20)
                }));
                sub.revealTimer = 0;
                sub.voidState = null;
                sub.artifacts = [];
                sub.transformation = null;
                strokes.push(sub);
                if (strokes.length > CFG.maxStrokes) strokes.shift();
            }
        } else if (transformation === 'data') {
            s.transformation = 'data';
            let snap = highDensity ? 25 : 15;
            for (let pt of s.points) {
                pt.x = round(pt.x / snap) * snap + random(-snap * 0.4, snap * 0.4);
                pt.y = round(pt.y / snap) * snap + random(-snap * 0.4, snap * 0.4);
            }
            s.dataTimer = 90;
        } else if (transformation === 'mutation') {
            s.transformation = 'mutation';
            let burst = (15 + random(35)) * mag;
            for (let pt of s.points) {
                let a = random(TWO_PI);
                pt.x += cos(a) * burst;
                pt.y += sin(a) * burst;
            }
            s.mutationPhase = Math.random() * 1000;
        } else if (transformation === 'resistance') {
            s.transformation = 'resistance';
            let range = 80 * mag;
            for (let pt of s.points) {
                let gx = round(pt.x / CFG.cellSize) * CFG.cellSize;
                let gy = round(pt.y / CFG.cellSize) * CFG.cellSize;
                let dx = pt.x - gx;
                let dy = pt.y - gy;
                let d = sqrt(dx * dx + dy * dy);
                if (d < 80 && d > 0) {
                    let force = (80 - d) / 80 * 100 * mag;
                    pt.x += (dx / d) * force;
                    pt.y += (dy / d) * force;
                } else if (d === 0) {
                    pt.x += random(-range, range);
                    pt.y += random(-range, range);
                }
            }
        }

        lastTransformationType = transformation;

        // ─── Void state: 2-3 seconds of static noise ───
        s.voidState = {
            active: true,
            timer: 0,
            duration: 120 + floor(random(60)),
            transformation: transformation
        };
    }

    function mouseReleased() {
        if (currentStroke) {
            if (currentStroke.points.length > 1) {
                applyTransformation(currentStroke);
                broadcastStroke(currentStroke);
            } else {
                strokes.pop();
            }
        }
        isDrawing = false;
        currentStroke = null;
    }

    function mouseMoved() {
        let gx = mouseX - scrollX, gy = mouseY - scrollY;
        for (let gl of gridLines) gl.applyDisturbance(gx, gy, 0.05);
    }

    // ─── Keyboard ────────────────────────────────────────────────────
    function keyPressed() {
        if (!voiceReady) startVoice();

        // Navigation (always works)
        if (keyCode === LEFT_ARROW || key === 'a' || key === 'A') { scrollX = max(scrollX - SCROLL_SPEED, -GRID_EXTENT); return false; }
        if (keyCode === RIGHT_ARROW || key === 'D') { scrollX = min(scrollX + SCROLL_SPEED, GRID_EXTENT); return false; }
        if (keyCode === UP_ARROW || key === 'w' || key === 'W') { scrollY = max(scrollY - SCROLL_SPEED, -GRID_EXTENT); return false; }
        if (keyCode === DOWN_ARROW) { scrollY = min(scrollY + SCROLL_SPEED, GRID_EXTENT); return false; }

        // Reset canvas
        if (key === 'r') {
            strokes = []; noiseTexts = []; particles = []; shockwaves = []; archive = [];
            ghosts = []; regionDensity = {}; remnants = []; connections = [];
            energy = 25;
            if (socket && socket.readyState === 1) socket.send(JSON.stringify({ type: 'reset' }));
            return false;
        }

        // Mode switching (lowercase only to avoid conflicts)
        if (key === 'd') { currentMode = MODES.DRAW; updateModeDisplay(); return false; }
        if (key === 'f') { currentMode = MODES.REFUSE; updateModeDisplay(); return false; }
        if (key === 'h') { currentMode = MODES.HAUNT; updateModeDisplay(); return false; }
        if (key === 's') { currentMode = MODES.SPEAK; updateModeDisplay(); return false; }
        if (key === 'g') { currentMode = MODES.GLITCH; updateModeDisplay(); return false; }
        if (key === 'e') { currentMode = MODES.ECHO; updateModeDisplay(); return false; }
        if (key === 'x') { currentMode = MODES.ERASE; updateModeDisplay(); return false; }

        // Stroke type switching
        if (key === '1') { currentStrokeType = STROKE_TYPES.DATA; updateModeDisplay(); return false; }
        if (key === '2') { currentStrokeType = STROKE_TYPES.TREMBLE; updateModeDisplay(); return false; }
        if (key === '3') { currentStrokeType = STROKE_TYPES.NOISE; updateModeDisplay(); return false; }
        if (key === '4') { currentStrokeType = STROKE_TYPES.GHOST; updateModeDisplay(); return false; }
        if (key === '5') { currentStrokeType = STROKE_TYPES.RESISTANCE; updateModeDisplay(); return false; }
        if (key === '6') { currentStrokeType = STROKE_TYPES.GLITCHSPEAK; updateModeDisplay(); return false; }
        if (keyCode === TAB) {
            let idx = STROKE_TYPE_ORDER.indexOf(currentStrokeType);
            currentStrokeType = STROKE_TYPE_ORDER[(idx + 1) % STROKE_TYPE_ORDER.length];
            updateModeDisplay();
            return false;
        }

        // Shift operations
        if (key === 'S') {
            saveToURL();
            return;
        }

        // Glitchspeak for other keys
        let glitchWord = generateGlitchspeak(key);
        broadcastGlitchspeak(glitchWord);
        createNoiseText(mouseX + random(-20, 20), mouseY + random(-20, 20), glitchWord, 'keyboard');
    }

    // ─── State ───────────────────────────────────────────────────────
    function saveToURL() {
        try {
            let state = { glitchspeak: glitchspeak.slice(-30), time: Date.now() };
            let json = JSON.stringify(state);
            let compressed = btoa(encodeURIComponent(json)).replace(/\+/g, '-').replace(/\//g, '_');
            window.location.hash = compressed;
            if (navigator.clipboard) navigator.clipboard.writeText(window.location.href).catch(() => {});
        } catch (e) {}
    }

    // ─── Glitch Rift Functions ─────────────────────────────────────

    function renderRift(sx, sy, rift) {
        let cfg = RIFT_CONFIG[rift.type];
        if (!cfg) return;
        let c = cfg.color;
        let pulse = 0.6 + sin(frameCount * 0.025 + rift.id.length) * 0.4;
        let baseR = 8 + pulse * 5;

        switch (rift.type) {
            case 'code':
                // Cyan tear with code fragment glow
                noStroke();
                fill(c[0], c[1], c[2], 25 * pulse);
                ellipse(sx, sy, baseR * 4, baseR * 4);
                fill(c[0], c[1], c[2], 80 * pulse);
                ellipse(sx, sy, baseR * 1.5, baseR * 1.5);
                fill(c[0], c[1], c[2], 120 * pulse);
                textFont('Courier New');
                textSize(6 + pulse * 2);
                textAlign(CENTER, CENTER);
                text('{ }', sx, sy);
                break;
            case 'ghost':
                // Purple shimmer
                noStroke();
                fill(c[0], c[1], c[2], 20 * pulse);
                ellipse(sx, sy, baseR * 4.5, baseR * 4.5);
                fill(c[0], c[1], c[2], 60 * pulse);
                ellipse(sx, sy, baseR * 1.8, baseR * 1.8);
                fill(c[0], c[1], c[2], 100 * pulse);
                ellipse(sx, sy, baseR * 0.8, baseR * 0.8);
                // Drifting ghost dots
                for (let i = 0; i < 3; i++) {
                    let a = frameCount * 0.02 + i * 2.1;
                    let dx = cos(a) * baseR * 1.2;
                    let dy = sin(a) * baseR * 1.2;
                    fill(c[0], c[1], c[2], 40 * pulse);
                    ellipse(sx + dx, sy + dy, 2, 2);
                }
                break;
            case 'connection':
                // Gold lines to nearby strokes/users (symbolic)
                noStroke();
                fill(c[0], c[1], c[2], 20 * pulse);
                ellipse(sx, sy, baseR * 4, baseR * 4);
                fill(c[0], c[1], c[2], 70 * pulse);
                ellipse(sx, sy, baseR * 1.3, baseR * 1.3);
                stroke(c[0], c[1], c[2], 40 * pulse);
                strokeWeight(0.5);
                for (let i = 0; i < 5; i++) {
                    let a = frameCount * 0.01 + i * 1.26;
                    let r = baseR * 1.8 + sin(frameCount * 0.03 + i) * 5;
                    line(sx, sy, sx + cos(a) * r, sy + sin(a) * r);
                }
                break;
            case 'energy':
                // Green pulsing glow
                noStroke();
                fill(c[0], c[1], c[2], 30 * pulse);
                ellipse(sx, sy, baseR * 4, baseR * 4);
                fill(c[0], c[1], c[2], 80 * pulse);
                ellipse(sx, sy, baseR * 1.6, baseR * 1.6);
                fill(c[0], c[1], c[2], 150 * pulse);
                ellipse(sx, sy, baseR * 0.6, baseR * 0.6);
                stroke(c[0], c[1], c[2], 60 * pulse);
                strokeWeight(0.6);
                for (let i = 0; i < 3; i++) {
                    let a = frameCount * 0.03 + i * 2.1;
                    let r = baseR * 1.5 + sin(frameCount * 0.06 + i) * 3;
                    line(sx + cos(a) * r * 0.5, sy + sin(a) * r * 0.5,
                         sx + cos(a) * r, sy + sin(a) * r);
                }
                break;
            case 'resistance':
                // Red chaotic distortion
                noStroke();
                fill(c[0], c[1], c[2], 20 * pulse);
                ellipse(sx, sy, baseR * 5, baseR * 5);
                fill(c[0], c[1], c[2], 60 * pulse);
                ellipse(sx, sy, baseR * 2, baseR * 2);
                stroke(c[0], c[1], c[2], 80 * pulse);
                strokeWeight(0.8);
                for (let i = 0; i < 6; i++) {
                    let a = random(TWO_PI);
                    let r = baseR * (0.5 + random() * 1.5);
                    line(sx, sy, sx + cos(a) * r, sy + sin(a) * r);
                }
                break;
            case 'glitchspeak':
                // White letter vortex
                noStroke();
                fill(c[0], c[1], c[2], 15 * pulse);
                ellipse(sx, sy, baseR * 4, baseR * 4);
                fill(c[0], c[1], c[2], 50 * pulse);
                ellipse(sx, sy, baseR * 1.5, baseR * 1.5);
                textFont('Courier New');
                textAlign(CENTER, CENTER);
                let chars = 'abcdefghijklmnopqrstuvwxyz';
                for (let i = 0; i < 5; i++) {
                    let a = frameCount * 0.02 + i * 1.26;
                    let r = baseR * 1.8 + sin(frameCount * 0.04 + i * 2) * 4;
                    let ch = chars[Math.floor(Math.random() * chars.length)];
                    fill(c[0], c[1], c[2], 40 * pulse + Math.random() * 30);
                    textSize(4 + pulse * 2);
                    text(ch, sx + cos(a) * r, sy + sin(a) * r);
                }
                break;
        }
    }

    function activateRift(rift) {
        if (rift.activated) return;

        // Send discovery to server
        if (socket && wsConnected) {
            socket.send(JSON.stringify({ type: 'rift-discover', riftId: rift.id, userId: me.id }));
        }

        // Start activation animation
        riftActiveAnim = { x: rift.x, y: rift.y, type: rift.type, timer: 30, maxTimer: 30 };
        rift.activated = true;

        let cfg = RIFT_CONFIG[rift.type];
        let sx = rift.x + scrollX, sy = rift.y + scrollY;
        let c = cfg ? cfg.color : [200, 180, 220];

        switch (rift.type) {
            case 'code':
                // The grid reveals its skeleton — code strings everywhere
                gridMode = 'code';
                gridModeTimer = 300; // 5 seconds
                // Explosion of code fragments from rift
                for (let i = 0; i < 30; i++) {
                    let rx = rift.x + random(-120, 120);
                    let ry = rift.y + random(-120, 120);
                    createNoiseText(rx, ry, getSystemReveal(), 'rift');
                }
                // Particle burst: cyan data sparks
                for (let i = 0; i < 40; i++) {
                    let ang = random(TWO_PI);
                    particles.push(new Particle(sx, sy, cos(ang) * random(1, 5), sin(ang) * random(1, 5),
                        30 + floor(random(30)), random(1, 4), [68, 204, 221]));
                }
                // Shockwave
                let csw = new Shockwave(rift.x, rift.y);
                csw.maxRadius = 300; csw.life = 30; csw.maxLife = 30;
                shockwaves.push(csw);
                // Permanent trace: code fragments fade over 5 min
                riftTraces.push({ type: 'code', x: rift.x, y: rift.y, life: 18000, maxLife: 18000, alpha: 90, data: null });
                break;

            case 'ghost':
                // The past erupts — ghosts swarm toward the user
                let nearbyGhosts = [];
                for (let g of ghosts) {
                    if (g.points.length === 0) continue;
                    let mid = g.points[floor(g.points.length / 2)];
                    if (mid && dist(mid.x, mid.y, rift.x, rift.y) < 300) {
                        nearbyGhosts.push(g);
                    }
                }
                if (nearbyGhosts.length > 0) {
                    ghostSwarm = { x: rift.x, y: rift.y, timer: 300, maxTimer: 300, phase: 0, scatter: false };
                    for (let i = 0; i < nearbyGhosts.length; i++) {
                        let g = nearbyGhosts[i];
                        g._swarming = true;
                        g._swarmOffset = (i / nearbyGhosts.length) * TWO_PI;
                        g._swarmRadius = 0.5 + Math.random() * 1.5;
                        g.flaring = true;
                        g.flareDuration = 300;
                    }
                }
                // Ghostly particles
                for (let i = 0; i < 30; i++) {
                    let ang = random(TWO_PI);
                    particles.push(new Particle(sx, sy, cos(ang) * random(0.5, 3), sin(ang) * random(0.5, 3),
                        40 + floor(random(40)), random(1, 3), [136, 68, 204]));
                }
                // Permanent trace
                riftTraces.push({ type: 'ghost', x: rift.x, y: rift.y, life: 18000, maxLife: 18000, alpha: 60, data: null });
                break;

            case 'connection':
                // The network reveals itself — user connections visible
                connectionTimer = 600; // 10 seconds
                // Connection particles
                let uids = Object.keys(users);
                for (let i = 0; i < uids.length && i < 12; i++) {
                    let ang = random(TWO_PI);
                    particles.push(new Particle(sx, sy, cos(ang) * random(1, 3), sin(ang) * random(1, 3),
                        60 + floor(random(30)), random(1, 2), [221, 204, 68]));
                }
                // Show gold shockwave
                let cnsw = new Shockwave(rift.x, rift.y);
                cnsw.maxRadius = 200; cnsw.life = 25; cnsw.maxLife = 25;
                shockwaves.push(cnsw);
                // Permanent trace
                riftTraces.push({ type: 'connection', x: rift.x, y: rift.y, life: 18000, maxLife: 18000, alpha: 50, data: null });
                break;

            case 'energy':
                // A green pulse wave expands — restoring energy
                pulseWaves.push({ x: rift.x, y: rift.y, radius: 0, maxRadius: 300, life: 35, maxLife: 35, hitUser: false });
                energy = min(25, energy + 30);
                // Energize nearby ghosts
                for (let g of ghosts) {
                    if (g.points.length === 0) continue;
                    let mid = g.points[floor(g.points.length / 2)];
                    if (mid && dist(mid.x, mid.y, rift.x, rift.y) < 200) {
                        g.flaring = true;
                        g.flareDuration = max(g.flareDuration || 0, 40);
                    }
                }
                // Green particle burst
                for (let i = 0; i < 50; i++) {
                    let ang = random(TWO_PI);
                    let spd = 0.5 + random() * 4;
                    particles.push(new Particle(sx, sy, cos(ang) * spd, sin(ang) * spd,
                        20 + floor(random(30)), random(1, 4), [68, 221, 136]));
                }
                // Permanent trace
                riftTraces.push({ type: 'energy', x: rift.x, y: rift.y, life: 18000, maxLife: 18000, alpha: 60, data: null });
                break;

            case 'resistance':
                // The grid fights back — a permanent scar is carved
                scarredRegions.push({ x: rift.x, y: rift.y, radius: 100 });
                // Massive grid disturbance
                for (let gl of gridLines) {
                    gl.applyDisturbance(rift.x, rift.y, 1.2);
                    for (let a = 0; a < TWO_PI; a += PI / 4) {
                        gl.applyDisturbance(rift.x + cos(a) * 80, rift.y + sin(a) * 80, 0.8);
                    }
                }
                // Distort all nearby strokes
                for (let s of strokes) {
                    for (let pt of s.points) {
                        if (dist(pt.x, pt.y, rift.x, rift.y) < 150) {
                            pt.x += random(-60, 60);
                            pt.y += random(-60, 60);
                        }
                    }
                }
                // Double shockwave
                let sw1 = new Shockwave(rift.x, rift.y);
                sw1.maxRadius = 200; sw1.life = 30; sw1.maxLife = 30;
                shockwaves.push(sw1);
                let sw2 = new Shockwave(rift.x, rift.y);
                sw2.maxRadius = 300; sw2.life = 20; sw2.maxLife = 20;
                shockwaves.push(sw2);
                // Red particle explosion
                for (let i = 0; i < 50; i++) {
                    let ang = random(TWO_PI);
                    let spd = 1 + random() * 6;
                    particles.push(new Particle(sx, sy, cos(ang) * spd, sin(ang) * spd,
                        25 + floor(random(30)), random(1, 5), [221, 68, 68]));
                }
                // Permanent scar (doesn't fade — stored in scarredRegions)
                riftTraces.push({ type: 'resistance', x: rift.x, y: rift.y, life: 999999, maxLife: 999999, alpha: 80, data: null });
                break;

            case 'glitchspeak':
                // Words rain down from the rift — glitchspeak in its raw form
                let seeds = ['d1sturb4nc3', '3ncrypt10n', 'r3fus4l', 'p4l1mp53st', 'gh0st1ng', 'fr4ctur3', 'm4nf3st0', 'd3c0d3', 'c0rrupt', 'dr1ft'];
                // Announce the new word
                let newWord = seeds[Math.floor(Math.random() * seeds.length)];
                if (!glitchspeak.includes(newWord)) {
                    glitchspeak.push(newWord);
                    if (socket && wsConnected) {
                        socket.send(JSON.stringify({ type: 'glitchspeak', words: [newWord] }));
                    }
                }
                // Rain of words for 5 seconds
                for (let i = 0; i < 50; i++) {
                    fallingWords.push({
                        x: rift.x + random(-150, 150),
                        y: rift.y - random(0, 200) - i * 8,
                        speed: 0.3 + random() * 1.2,
                        word: seeds[Math.floor(Math.random() * seeds.length)],
                        size: 4 + random() * 6,
                        life: 120 + floor(random(60)),
                        maxLife: 180,
                        alpha: 80,
                        maxAlpha: 60 + random() * 40,
                        phase: random(TWO_PI)
                    });
                }
                // Prominent word display
                createNoiseText(rift.x, rift.y, '\u2733 ' + newWord + ' \u2733', 'rift');
                // Particle burst
                for (let i = 0; i < 35; i++) {
                    let ang = random(TWO_PI);
                    particles.push(new Particle(sx, sy, cos(ang) * random(0.5, 3), sin(ang) * random(0.5, 3),
                        25 + floor(random(30)), random(1, 3), [200, 200, 200]));
                }
                // Permanent trace
                riftTraces.push({ type: 'glitchspeak', x: rift.x, y: rift.y, life: 18000, maxLife: 18000, alpha: 70, data: newWord });
                break;
        }
    }

    (function loadFromHash() {
        let hash = window.location.hash.slice(1);
        if (!hash) return;
        try {
            let json = decodeURIComponent(atob(hash.replace(/-/g, '+').replace(/_/g, '/')));
            let state = JSON.parse(json);
            if (state.glitchspeak) glitchspeak = state.glitchspeak;
        } catch (e) {}
    })();
    </script>
